---
# Verify kubelet service is healthy and properly configured

- name: Check kubelet service status
  service_facts:

- name: Verify kubelet service is running
  assert:
    that:
      - ansible_facts.services['kubelet.service'] is defined
      - ansible_facts.services['kubelet.service'].state == 'running'
      - ansible_facts.services['kubelet.service'].status == 'enabled'
    fail_msg: |
      ❌ kubelet service is not running properly
      Status: {{ ansible_facts.services['kubelet.service'].state | default('unknown') }}
      Enabled: {{ ansible_facts.services['kubelet.service'].status | default('unknown') }}
    success_msg: "✓ kubelet service is running and enabled"

- name: Check kubelet configuration file
  stat:
    path: "{{ kube_config_dir }}/kubelet.conf"
  register: kubelet_config

- name: Verify kubelet configuration exists
  assert:
    that:
      - kubelet_config.stat.exists
      - kubelet_config.stat.isreg
    fail_msg: "❌ kubelet configuration not found at {{ kube_config_dir }}/kubelet.conf"
    success_msg: "✓ kubelet configuration file exists"

- name: Check kubelet certificate
  stat:
    path: "{{ kube_cert_dir }}/kubelet-client.crt"
  register: kubelet_cert

- name: Verify kubelet has client certificate
  assert:
    that:
      - kubelet_cert.stat.exists
      - kubelet_cert.stat.isreg
    fail_msg: "❌ kubelet client certificate not found"
    success_msg: "✓ kubelet client certificate exists"

- name: Test kubelet health endpoint
  uri:
    url: "http://127.0.0.1:10248/healthz"
    method: GET
    status_code: 200
  register: kubelet_health
  retries: 3
  delay: 5

- name: Verify kubelet health check
  assert:
    that:
      - kubelet_health.status == 200
      - kubelet_health.content == "ok"
    fail_msg: "❌ kubelet health endpoint not responding correctly"
    success_msg: "✓ kubelet health endpoint responding: {{ kubelet_health.content }}"

- name: Check kubelet logs for errors
  command: journalctl -u kubelet --no-pager --lines=10 --since="5 minutes ago"
  register: kubelet_logs
  changed_when: false

- name: Analyze kubelet logs for critical errors
  set_fact:
    kubelet_errors: "{{ kubelet_logs.stdout_lines | select('match', '.*ERROR.*') | list }}"

- name: Report kubelet log analysis
  debug:
    msg: |
      ✓ Kubelet Service Verification Complete
      - Service: kubelet running and enabled
      - Configuration: Present and accessible  
      - Certificates: Valid client certificate exists
      - Health endpoint: Responding correctly
      - Recent errors: {{ kubelet_errors | length }} error(s) in last 5 minutes
      {% if kubelet_errors | length > 0 %}
      Recent errors found:
      {% for error in kubelet_errors %}
      - {{ error }}
      {% endfor %}
      {% endif %}