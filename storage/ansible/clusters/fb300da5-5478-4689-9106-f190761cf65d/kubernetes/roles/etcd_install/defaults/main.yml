---
# etcd Installation Configuration
# Uses centralized version and path configuration from group_vars/all/

# Version - inherits from centralized config
etcd_version_local: "{{ etcd_version }}"

# Architecture - uses centralized architecture detection
etcd_arch: "{{ host_architecture }}"

# Binary download URLs - uses centralized base URLs
etcd_download_base_url: "{{ etcd_release_url }}"

# Installation paths - uses centralized paths
etcd_bin_dir: "{{ bin_dir }}"
etcd_data_dir: "{{ etcd_data_dir }}"  # Already defined in main.yml
etcd_config_dir: "/etc/etcd"
systemd_dir: "{{ systemd_dir }}"

# etcd cluster configuration
etcd_cluster_name: "{{ cluster_name }}-etcd"
etcd_initial_cluster_state: "new"
etcd_initial_cluster_token: "{{ cluster_name }}-etcd-token"

# Network configuration
etcd_client_port: 2379
etcd_peer_port: 2380
etcd_listen_client_urls: "https://127.0.0.1:{{ etcd_client_port }}"
etcd_listen_peer_urls: "https://127.0.0.1:{{ etcd_peer_port }}"
etcd_advertise_client_urls: "https://127.0.0.1:{{ etcd_client_port }}"
etcd_initial_advertise_peer_urls: "https://127.0.0.1:{{ etcd_peer_port }}"

# TLS Configuration
etcd_cert_file: "{{ etcd_config_dir }}/server.pem"
etcd_key_file: "{{ etcd_config_dir }}/server-key.pem"
etcd_trusted_ca_file: "{{ etcd_config_dir }}/ca.pem"
etcd_client_cert_auth: true
etcd_peer_cert_file: "{{ etcd_config_dir }}/server.pem"
etcd_peer_key_file: "{{ etcd_config_dir }}/server-key.pem"
etcd_peer_trusted_ca_file: "{{ etcd_config_dir }}/ca.pem"
etcd_peer_client_cert_auth: true

# Certificate configuration - uses centralized certificate settings
etcd_ca_key_size: "{{ certificates_key_size }}"
etcd_cert_key_size: "{{ certificates_key_size }}"
etcd_cert_days: 3650

# Download configuration - uses centralized settings
download_retries: "{{ download_retries }}"
download_delay: "{{ download_delay }}"
download_timeout: "{{ download_timeout }}"

# Performance tuning
etcd_heartbeat_interval: "{{ etcd_heartbeat_interval }}"
etcd_election_timeout: "{{ etcd_election_timeout }}"
etcd_snapshot_count: "{{ etcd_snapshot_count | default(10000) }}"