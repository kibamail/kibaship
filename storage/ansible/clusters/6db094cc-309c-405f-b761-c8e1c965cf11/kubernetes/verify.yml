---
# Kibaship Kubernetes Cluster Verification
# Comprehensive health check after cluster deployment

- name: Display verification banner
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  tasks:
    - name: Show verification start message
      debug:
        msg: |
          ============================================
          KIBASHIP CLUSTER VERIFICATION STARTING
          ============================================
          Verifying Kubernetes cluster health after deployment
          This will check etcd, nodes, and core cluster components

- name: Verify cluster health on all nodes
  hosts: k8s_cluster
  become: true
  any_errors_fatal: true
  serial: "{{ serial | default('100%') }}"
  roles:
    - { role: k8s-verify, tags: ['verify', 'health'] }

- name: Display verification summary
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  tasks:
    - name: Show verification completion
      debug:
        msg: |
          ============================================
          KIBASHIP CLUSTER VERIFICATION COMPLETE ✓
          ============================================
          
          Cluster Health Status:
          ✓ Control Plane Nodes: {{ groups['kube_control_plane'] | length }}
          ✓ Worker Nodes: {{ groups['kube_node'] | default([]) | length }}
          ✓ Total Verified Nodes: {{ groups['k8s_cluster'] | length }}
          
          All cluster components are running correctly!
          Your Kubernetes cluster is ready for workloads.
          
          Next steps:
          - Install CNI plugin (Cilium) if not already done
          - Deploy cluster applications
          - Configure monitoring and logging