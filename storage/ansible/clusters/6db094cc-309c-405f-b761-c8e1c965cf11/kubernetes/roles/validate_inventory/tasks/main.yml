---
# validate_inventory: Critical infrastructure validation before cluster deployment
# Ensures all required load balancer and network configuration is properly defined
# Following Kubespray's validate_inventory patterns with Kibaship-specific requirements

- name: Display validation banner
  debug:
    msg: |
      ============================================
      KIBASHIP INVENTORY VALIDATION
      ============================================
      Validating critical infrastructure requirements
      for HA Kubernetes cluster deployment

- name: Validate kube control plane endpoint is defined  
  assert:
    that:
      - kube_control_plane_endpoint is defined
      - kube_control_plane_endpoint | length > 0
    fail_msg: |
      CRITICAL ERROR: kube_control_plane_endpoint MUST BE DEFINED
      
      This endpoint will be used by:
      - Worker nodes to communicate with control plane
      - External kubectl access to the cluster
      - Internal cluster components for API access
      
      This should be automatically set from your cluster configuration.
      If you see this error, check your cluster load balancer configuration.
    success_msg: "✓ Kube control plane endpoint is properly defined: {{ kube_control_plane_endpoint }}"

- name: Validate kube load balancer public IP is defined
  assert:
    that:
      - kube_load_balancer_public_ip is defined
      - kube_load_balancer_public_ip | length > 0
      - kube_load_balancer_public_ip | regex_search('^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$')
    fail_msg: |
      CRITICAL ERROR: Kube load balancer public IP MUST BE DEFINED
      
      This is the public IP address of your Kube API load balancer.
      It will be added to the API server certificate SANs for external access.
      
      Current value: {{ kube_load_balancer_public_ip | default('UNDEFINED') }}
      
      This should be automatically set from your cluster load balancer configuration.
      If you see this error, check that your cluster has a load balancer with public IP.
    success_msg: "✓ Kube load balancer public IP is properly defined: {{ kube_load_balancer_public_ip }}"

- name: Validate kube_load_balancer_private_ip if defined (optional)
  assert:
    that:
      - kube_load_balancer_private_ip | regex_search('^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$')
    fail_msg: |
      ERROR: kube_load_balancer_private_ip is invalid
      Current value: {{ kube_load_balancer_private_ip }}
      
      If defined, this must be a valid IP address format.
      Example: kube_load_balancer_private_ip: "10.0.1.100"
      
      This variable is optional - remove it if not needed.
    success_msg: "✓ kube_load_balancer_private_ip is properly defined: {{ kube_load_balancer_private_ip }}"
  when: kube_load_balancer_private_ip is defined

# kube_load_balancer_domain is no longer needed - kube_control_plane_endpoint serves this purpose

- name: Validate minimum cluster node requirements
  assert:
    that:
      - groups['kube_control_plane'] | length >= 1
      - groups['kube_node'] | default([]) | length >= 1
    fail_msg: |
      CRITICAL ERROR: Insufficient cluster nodes
      Control plane nodes: {{ groups['kube_control_plane'] | length }}
      Worker nodes: {{ groups['kube_node'] | default([]) | length }}
      
      Minimum requirements:
      - At least 1 control plane node
      - At least 1 worker node
      
      Current control plane hosts: {{ groups['kube_control_plane'] | join(', ') }}
      Current worker hosts: {{ groups['kube_node'] | default([]) | join(', ') }}
    success_msg: "✓ Cluster node requirements met: {{ groups['kube_control_plane'] | length }} control plane, {{ groups['kube_node'] | default([]) | length }} workers"

- name: Validate all control plane nodes have required variables
  assert:
    that:
      - hostvars[item]['ip'] is defined
      - (hostvars[item]['ip'] | length) > 0
    fail_msg: |
      CRITICAL ERROR: Control plane node {{ item }} missing ip variable
      
      All control plane nodes must have 'ip' defined for internal cluster communication.
      
      Please ensure your inventory defines:
      {{ item }} ansible_host=PUBLIC_IP ip=PRIVATE_IP
    success_msg: "✓ Control plane node {{ item }} has required ip: {{ hostvars[item]['ip'] }}"
  loop: "{{ groups['kube_control_plane'] }}"

- name: Validate network configuration
  assert:
    that:
      - kube_service_addresses is defined
      - kube_pods_subnet is defined
      - kube_service_addresses != kube_pods_subnet
    fail_msg: |
      CRITICAL ERROR: Network CIDR configuration invalid
      
      Service subnet: {{ kube_service_addresses | default('UNDEFINED') }}
      Pod subnet: {{ kube_pods_subnet | default('UNDEFINED') }}
      
      These must be defined and non-overlapping CIDR ranges.
    success_msg: |
      ✓ Network configuration validated:
        - Service subnet: {{ kube_service_addresses }}
        - Pod subnet: {{ kube_pods_subnet }}

- name: Display validation success summary
  debug:
    msg: |
      ============================================
      INVENTORY VALIDATION SUCCESSFUL ✓
      ============================================
      
      Load Balancer Configuration:
      ✓ Kube Control Plane Endpoint: {{ kube_control_plane_endpoint }}
      ✓ Kube Load Balancer Public IP: {{ kube_load_balancer_public_ip }}
      {% if kube_load_balancer_private_ip is defined %}
      ✓ Kube Load Balancer Private IP: {{ kube_load_balancer_private_ip }}
      {% endif %}
      {% if ingress_control_plane_endpoint is defined %}
      ✓ Ingress Control Plane Endpoint: {{ ingress_control_plane_endpoint }}
      ✓ Ingress Load Balancer Public IP: {{ ingress_load_balancer_public_ip }}
      {% if ingress_load_balancer_private_ip is defined %}
      ✓ Ingress Load Balancer Private IP: {{ ingress_load_balancer_private_ip }}
      {% endif %}
      {% endif %}
      
      Cluster Configuration:
      ✓ Control Plane Nodes: {{ groups['kube_control_plane'] | length }}
      ✓ Worker Nodes: {{ groups['kube_node'] | default([]) | length }}
      ✓ Network Configuration: Validated
      
      Node Communication Strategy:
      ✓ All nodes use ip for internal cluster communication
      ✓ Worker → Control Plane: via {{ apiserver_loadbalancer_domain_name | default(kube_control_plane_endpoint) }}
      {% if kube_load_balancer_private_ip is defined %}
      ✓ Preferred internal communication over private network
      {% else %}
      ✓ Communication over public internet (no private LB IP)
      {% endif %}
      
      Proceeding with cluster deployment...