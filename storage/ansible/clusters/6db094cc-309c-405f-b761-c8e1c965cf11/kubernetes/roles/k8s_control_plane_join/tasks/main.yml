---
# k8s_control_plane_join: Join additional control plane nodes to HA cluster
# Based on Kubespray's kubernetes/control-plane kubeadm-secondary tasks
# Runs only on additional control plane nodes (kube_control_plane[1:])

- name: Check if this is an additional control plane node
  assert:
    that:
      - inventory_hostname in groups['kube_control_plane']
      - inventory_hostname != groups['kube_control_plane'][0]
    fail_msg: "This role should only run on additional control plane nodes (not the first)"
    success_msg: "Running control plane join on additional control plane node"

- name: Check if kubeadm has already joined this node
  stat:
    path: /etc/kubernetes/kubelet.conf
    get_attributes: false
    get_checksum: false
    get_mime: false
  register: kubelet_conf_exists

- name: Set discovery endpoint from load balancer or first control plane
  set_fact:
    kubeadm_discovery_address: >-
      {%- if kube_control_plane_endpoint is defined -%}
      {{ kube_control_plane_endpoint }}
      {%- else -%}
      {{ hostvars[groups['kube_control_plane'][0]]['ip'] }}:{{ kube_apiserver_port }}
      {%- endif %}

- name: Wait for first control plane API server to be ready
  wait_for:
    host: "{{ kubeadm_discovery_address.split(':')[0] }}"
    port: "{{ kubeadm_discovery_address.split(':')[1] }}"
    timeout: 300
  when: not kubelet_conf_exists.stat.exists

- name: Get cluster join information from first control plane node
  set_fact:
    cluster_join_info: "{{ hostvars[groups['kube_control_plane'][0]]['cluster_join_info'] }}"
  when: 
    - not kubelet_conf_exists.stat.exists
    - hostvars[groups['kube_control_plane'][0]]['cluster_join_info'] is defined

- name: Fail if join information is missing
  fail:
    msg: "Cluster join information not available from first control plane node. Ensure k8s_cluster_init role has run successfully."
  when:
    - not kubelet_conf_exists.stat.exists
    - cluster_join_info is not defined

- name: Upload certificates so they are fresh and not expired
  command: >-
    kubeadm init phase upload-certs --upload-certs
    --config {{ kube_config_dir }}/kubeadm-config.yaml
  register: kubeadm_upload_cert
  delegate_to: "{{ groups['kube_control_plane'][0] }}"
  when:
    - not kubelet_conf_exists.stat.exists
    - groups['kube_control_plane'] | length > 1

- name: Parse fresh certificate key
  set_fact:
    fresh_certificate_key: "{{ kubeadm_upload_cert.stdout_lines[-1] | trim }}"
  when:
    - kubeadm_upload_cert is defined
    - kubeadm_upload_cert.stdout_lines is defined
    - kubeadm_upload_cert.stdout_lines | length > 0

- name: Reset cert directory if manifests exist (recovery scenario)
  shell: >-
    if [ -f /etc/kubernetes/manifests/kube-apiserver.yaml ]; then
      kubeadm reset -f --cert-dir {{ kube_cert_dir }}
    fi
  environment:
    PATH: "{{ bin_dir }}:{{ ansible_env.PATH }}"
  when:
    - not kubelet_conf_exists.stat.exists
    - inventory_hostname != groups['kube_control_plane'][0]

- name: Create kubeadm control plane join configuration
  template:
    src: "kubeadm-controlplane.yaml.j2"
    dest: "{{ kube_config_dir }}/kubeadm-controlplane.yaml"
    mode: '0640'
    owner: root
    group: root
    backup: true
  when: not kubelet_conf_exists.stat.exists

- name: Join control plane node to the cluster
  command: >-
    timeout {{ kubeadm_join_timeout }}
    kubeadm join
    --config {{ kube_config_dir }}/kubeadm-controlplane.yaml
    {% if kubeadm_ignore_preflight_errors | length > 0 %}
    --ignore-preflight-errors={{ kubeadm_ignore_preflight_errors | join(',') }}
    {% endif %}
    {% if kubeadm_join_phases_skip | length > 0 %}
    --skip-phases={{ kubeadm_join_phases_skip | join(',') }}
    {% endif %}
  environment:
    PATH: "{{ bin_dir }}:{{ ansible_env.PATH }}"
  register: kubeadm_join_control_plane
  retries: 3
  delay: 10
  until: kubeadm_join_control_plane is succeeded
  when: not kubelet_conf_exists.stat.exists

- name: Create .kube directory for root user
  file:
    path: /root/.kube
    state: directory
    mode: '0700'
    owner: root
    group: root

- name: Copy admin.conf to root's kube config
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    owner: root
    group: root
    mode: '0600'

- name: Wait for API server to be ready on this node
  uri:
    url: "https://{{ hostvars[inventory_hostname]['ip'] }}:{{ kube_apiserver_port }}/healthz"
    method: GET
    validate_certs: false
    status_code: 200
  register: api_server_check
  until: api_server_check.status == 200
  retries: 30
  delay: 10

- name: Verify cluster status from this control plane node
  command: kubectl get nodes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cluster_nodes_from_joined_cp
  changed_when: false

- name: Display control plane join results
  debug:
    msg: |
      ============================================
      CONTROL PLANE NODE JOINED SUCCESSFULLY
      ============================================
      ✓ Node: {{ inventory_hostname }}
      ✓ Cluster: {{ cluster_name }}
      ✓ Control Plane Endpoint: {{ kubeadm_discovery_address }}
      ✓ Local API Server: {{ hostvars[inventory_hostname]['ip'] }}:{{ kube_apiserver_port }}
      
      Cluster Nodes (from this control plane):
      {{ cluster_nodes_from_joined_cp.stdout }}
      
      High Availability Status:
      - Control Plane Nodes: {{ groups['kube_control_plane'] | length }}
      - Etcd Members: {{ groups['kube_control_plane'] | length }}