---
- name: Remove conflicting system runc packages
  apt:
    name:
      - runc
      - docker-runc
    state: absent
    purge: true

- name: Create temporary directory for runc download
  tempfile:
    state: directory
    suffix: _runc_download
  register: runc_temp_dir

# Architecture is now centralized in group_vars/all/versions.yml as host_architecture

- name: Download runc {{ runc_version }} binary
  get_url:
    url: "{{ runc_release_url }}/v{{ runc_version }}/runc.{{ host_architecture }}"
    dest: "{{ runc_temp_dir.path }}/runc"
    mode: '0755'
    timeout: "{{ download_timeout }}"
    validate_certs: true
  register: runc_download

- name: Install runc binary to {{ bin_dir }}
  copy:
    src: "{{ runc_temp_dir.path }}/runc"
    dest: "{{ bin_dir }}/runc"
    owner: root
    group: root
    mode: '0755'
    remote_src: true

- name: Clean up temporary directory
  file:
    path: "{{ runc_temp_dir.path }}"
    state: absent

- name: Verify runc installation
  command: "{{ bin_dir }}/runc --version"
  register: runc_version_check
  changed_when: false

