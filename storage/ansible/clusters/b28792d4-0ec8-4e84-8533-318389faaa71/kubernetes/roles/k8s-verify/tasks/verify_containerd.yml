---
# Verify containerd container runtime is healthy

- name: Check containerd service status
  service_facts:

- name: Verify containerd service is running
  assert:
    that:
      - ansible_facts.services['containerd.service'] is defined
      - ansible_facts.services['containerd.service'].state == 'running'
      - ansible_facts.services['containerd.service'].status == 'enabled'
    fail_msg: |
      ❌ containerd service is not running properly
      Status: {{ ansible_facts.services['containerd.service'].state | default('unknown') }}
      Enabled: {{ ansible_facts.services['containerd.service'].status | default('unknown') }}
    success_msg: "✓ containerd service is running and enabled"

- name: Test containerd socket communication
  command: ctr version
  register: containerd_version
  changed_when: false
  failed_when: containerd_version.rc != 0

- name: Display containerd version
  debug:
    msg: "✓ containerd version: {{ containerd_version.stdout_lines[0] | regex_search('containerd.io ([0-9.]+)', '\\1') | first }}"

- name: Check containerd runtime configuration
  stat:
    path: /etc/containerd/config.toml
  register: containerd_config

- name: Verify containerd configuration exists
  assert:
    that:
      - containerd_config.stat.exists
      - containerd_config.stat.isreg
    fail_msg: "❌ containerd configuration file not found at /etc/containerd/config.toml"
    success_msg: "✓ containerd configuration file exists"

- name: Test container image operations
  command: ctr image ls
  register: containerd_images
  changed_when: false
  failed_when: containerd_images.rc != 0

- name: Display containerd status summary
  debug:
    msg: |
      ✓ Container Runtime Verification Complete
      - Service: containerd running and enabled
      - Socket: Accessible and responding
      - Configuration: Present and valid
      - Image operations: Working correctly