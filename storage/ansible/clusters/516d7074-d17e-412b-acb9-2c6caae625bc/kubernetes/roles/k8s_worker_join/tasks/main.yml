---
# k8s_worker_join: Join worker nodes to Kubernetes cluster
# Based on Kubespray's kubernetes/kubeadm role, adapted for Kibaship architecture
# Runs only on worker nodes (kube_node group, not kube_control_plane)

- name: Check if this is a worker node
  assert:
    that:
      - inventory_hostname in groups['kube_node']
      - inventory_hostname not in groups['kube_control_plane'] | default([])
    fail_msg: "This role should only run on worker nodes (kube_node group, not control plane)"
    success_msg: "Running worker join on {{ inventory_hostname }}"

- name: Check if kubeadm has already joined this node
  stat:
    path: /etc/kubernetes/kubelet.conf
    get_attributes: false
    get_checksum: false
    get_mime: false
  register: kubelet_conf_exists

- name: Skip join if node is already part of cluster
  debug:
    msg: "Node {{ inventory_hostname }} is already joined to the cluster, skipping join process"
  when: kubelet_conf_exists.stat.exists

- name: Set discovery endpoint from load balancer
  set_fact:
    kubeadm_discovery_address: "{{ kube_control_plane_endpoint }}"
  when: not kubelet_conf_exists.stat.exists

- name: Wait for control plane API server to be ready
  wait_for:
    host: "{{ kubeadm_discovery_address.split(':')[0] }}"
    port: "{{ kubeadm_discovery_address.split(':')[1] }}"
    timeout: 300
  when: not kubelet_conf_exists.stat.exists

- name: Get cluster join information from first control plane node
  set_fact:
    cluster_join_info: "{{ hostvars[groups['kube_control_plane'][0]]['cluster_join_info'] }}"
  when: 
    - not kubelet_conf_exists.stat.exists
    - hostvars[groups['kube_control_plane'][0]]['cluster_join_info'] is defined

- name: Fail if join information is missing
  fail:
    msg: "Cluster join information not available from first control plane node. Ensure k8s_cluster_init role has run successfully."
  when:
    - not kubelet_conf_exists.stat.exists
    - cluster_join_info is not defined

- name: Create temporary kubeadm token for worker join
  command: >-
    kubeadm token create --ttl {{ kubeadm_token_ttl }}
  register: worker_join_token
  delegate_to: "{{ groups['kube_control_plane'][0] }}"
  when: 
    - not kubelet_conf_exists.stat.exists
    - cluster_join_info.token is not defined
  changed_when: false

- name: Set worker join token
  set_fact:
    cluster_join_token: "{{ worker_join_token.stdout if worker_join_token is defined else cluster_join_info.token }}"
  when: not kubelet_conf_exists.stat.exists

- name: Get CA certificate hash
  shell: >-
    openssl x509 -pubkey -in {{ kube_cert_dir }}/ca.crt | 
    openssl rsa -pubin -outform der 2>/dev/null | 
    openssl dgst -sha256 -hex | sed 's/^.* //'
  register: ca_cert_hash_result
  delegate_to: "{{ groups['kube_control_plane'][0] }}"
  when: not kubelet_conf_exists.stat.exists
  changed_when: false

- name: Set CA certificate hash
  set_fact:
    cluster_ca_cert_hash: "{{ ca_cert_hash_result.stdout }}"
  when: not kubelet_conf_exists.stat.exists

- name: Reset cert directory if manifests exist (recovery scenario)
  shell: >-
    if [ -f /etc/kubernetes/manifests/kube-apiserver.yaml ]; then
      kubeadm reset -f --cert-dir {{ kube_cert_dir }}
    fi
  environment:
    PATH: "{{ bin_dir }}:{{ ansible_env.PATH }}"
  when:
    - not kubelet_conf_exists.stat.exists
    - inventory_hostname in groups['kube_node']

- name: Create kubeadm worker join configuration
  template:
    src: "kubeadm-worker.yaml.j2"
    dest: "{{ kube_config_dir }}/kubeadm-worker.yaml"
    mode: '0640'
    owner: root
    group: root
    backup: true
  when: not kubelet_conf_exists.stat.exists

- name: Join worker node to the cluster
  command: >-
    timeout {{ kubeadm_join_timeout }}
    kubeadm join
    --config {{ kube_config_dir }}/kubeadm-worker.yaml
    {% if kubeadm_ignore_preflight_errors | length > 0 %}
    --ignore-preflight-errors={{ kubeadm_ignore_preflight_errors | join(',') }}
    {% endif %}
    {% if kubeadm_join_phases_skip | length > 0 %}
    --skip-phases={{ kubeadm_join_phases_skip | join(',') }}
    {% endif %}
  environment:
    PATH: "{{ bin_dir }}:{{ ansible_env.PATH }}"
  register: kubeadm_join_worker
  retries: 3
  delay: 10
  until: kubeadm_join_worker is succeeded
  when: not kubelet_conf_exists.stat.exists

- name: Update server field in kubelet kubeconfig if needed
  lineinfile:
    dest: "{{ kube_config_dir }}/kubelet.conf"
    regexp: '^    server:'
    line: '    server: https://{{ kube_control_plane_endpoint }}'
    backup: true
  when:
    - kubeadm_discovery_address != kube_control_plane_endpoint
  notify: Worker | restart kubelet

- name: Wait for kubelet to be ready
  wait_for:
    port: 10250
    host: "{{ hostvars[inventory_hostname]['ip'] }}"
    timeout: 60
  when: kubeadm_join_worker is changed

- name: Verify worker node joined successfully
  command: kubectl get nodes {{ inventory_hostname }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: worker_node_status
  delegate_to: "{{ groups['kube_control_plane'][0] }}"
  retries: 10
  delay: 6
  until: worker_node_status is succeeded
  when: kubeadm_join_worker is changed
  changed_when: false

- name: Display worker join results
  debug:
    msg: |
      ============================================
      WORKER NODE JOINED SUCCESSFULLY
      ============================================
      ✓ Node: {{ inventory_hostname }}
      ✓ Cluster: {{ cluster_name }}
      ✓ Control Plane Endpoint: {{ kube_control_plane_endpoint }}
      ✓ Node IP: {{ hostvars[inventory_hostname]['ip'] }}
      
      Worker Node Status:
      {{ worker_node_status.stdout if worker_node_status is defined else 'Join skipped - already member' }}
      
      Cluster Configuration:
      - Worker Nodes: {{ groups['kube_node'] | length }}
      - Control Plane Nodes: {{ groups['kube_control_plane'] | length }}
      - Container Runtime: {{ cri_socket }}
  when: kubeadm_join_worker is changed or kubelet_conf_exists.stat.exists