---
# k8s_cluster_init role default variables
# Uses centralized configuration from group_vars/all/

# Kubernetes version configuration - inherits from centralized config
kube_version: "{{ kubernetes_version }}"
kubeadm_config_api_version: "{{ kubeadm_config_api_version }}"

# Cluster configuration - inherits from centralized config
cluster_name: "{{ cluster_name }}"
kube_service_addresses: "{{ kube_service_addresses }}"
kube_pods_subnet: "{{ kube_pods_subnet }}"
dns_domain: "{{ dns_domain }}"

# API server configuration - inherits from centralized config
kube_apiserver_port: "{{ kube_apiserver_port }}"
kube_apiserver_bind_address: "{{ kube_apiserver_bind_address }}"

# Directory configuration - uses centralized paths
kube_cert_dir: "{{ kube_cert_dir }}"
kube_config_dir: "{{ kube_config_dir }}"
bin_dir: "{{ bin_dir }}"

# kubeadm initialization settings
kubeadm_init_timeout: 600s
kubeadm_ignore_preflight_errors: []
kubeadm_init_phases_skip: ["addon/kube-proxy"]

# Feature gates - uses centralized configuration
kube_feature_gates: "{{ kube_feature_gates }}"

# Control plane endpoint (dynamically determined)
kube_control_plane_endpoint: >-
  {%- if groups['kube_control_plane'] | length > 1 -%}
  {{ hostvars[groups['kube_control_plane'][0]]['access_ip'] }}:{{ kube_apiserver_port }}
  {%- else -%}
  {{ hostvars[groups['kube_control_plane'][0]]['ip'] }}:{{ kube_apiserver_port }}
  {%- endif -%}

# Certificate SANs for API server
supplementary_addresses_in_ssl_keys: []

# Upload certificates for HA setup
upload_certs: "{{ groups['kube_control_plane'] | length > 1 }}"

# Networking - uses centralized configuration
kube_proxy_mode: "{{ kube_proxy_mode }}"

# Container runtime - uses centralized configuration
cri_socket: "{{ cri_socket }}"

# Image repository - uses centralized configuration
kube_image_repo: "{{ kube_image_repo }}"

# TLS configuration - uses centralized configuration
tls_min_version: "{{ tls_min_version }}"