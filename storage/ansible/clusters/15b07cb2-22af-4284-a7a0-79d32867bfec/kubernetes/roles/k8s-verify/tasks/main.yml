---
# k8s-verify: Comprehensive Kubernetes cluster health verification
# Runs on all nodes to verify successful cluster deployment

- name: Display verification banner for this node
  debug:
    msg: |
      ==========================================
      VERIFYING NODE: {{ inventory_hostname }}
      ==========================================
      Node Type: {{ 'Control Plane' if inventory_hostname in groups['kube_control_plane'] else 'Worker' }}
      IP Address: {{ hostvars[inventory_hostname]['ip'] }}

- name: Verify container runtime is running
  import_tasks: verify_containerd.yml
  tags: ['containerd', 'runtime']

- name: Verify kubelet service is running
  import_tasks: verify_kubelet.yml
  tags: ['kubelet', 'node']

- name: Verify etcd on control plane nodes
  import_tasks: verify_etcd.yml
  when: inventory_hostname in groups['kube_control_plane']
  tags: ['etcd', 'control-plane']

- name: Verify Kubernetes API server on control plane nodes
  import_tasks: verify_apiserver.yml
  when: inventory_hostname in groups['kube_control_plane']
  tags: ['apiserver', 'control-plane']

- name: Verify node registration with cluster
  import_tasks: verify_node_status.yml
  when: inventory_hostname in groups['kube_control_plane']
  tags: ['cluster', 'nodes']

- name: Display node verification results
  debug:
    msg: |
      ==========================================
      NODE VERIFICATION COMPLETE ✓
      ==========================================
      ✓ Node: {{ inventory_hostname }}
      ✓ Container Runtime: containerd running
      ✓ Kubelet Service: Active and running
      {% if inventory_hostname in groups['kube_control_plane'] %}
      ✓ Etcd Service: Healthy and accessible
      ✓ API Server: Responding correctly
      ✓ Cluster Nodes: All registered and ready
      {% else %}
      ✓ Worker Node: Successfully joined cluster
      {% endif %}
      
      Node is healthy and ready for workloads!