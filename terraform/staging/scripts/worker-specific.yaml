---
# Worker-specific setup steps for Replicated PV requirements
worker_specific:
  storage_modules:
    - "echo '=== Storage Kernel Modules (Worker Only) ==='"
    - "modprobe nvme-tcp || true"
    - "modprobe ext4 || true"
    - "echo 'nvme-tcp' >> /etc/modules-load.d/replicated-pv.conf"
    - "echo 'ext4' >> /etc/modules-load.d/replicated-pv.conf"
    
  hugepages_sysctl:
    - "echo '=== Hugepages Sysctl Configuration ==='"
    - "cat > /etc/sysctl.d/99-hugepages.conf << EOF"
    - "vm.nr_hugepages = 1024"
    - "EOF"
    - "sysctl --system"
    
  hugepages_immediate:
    - "echo '=== Immediate Hugepages Configuration ==='"
    - "echo 1024 > /sys/kernel/mm/hugepages/hugepages-2048kB/nr_hugepages"
    
  grub_configuration:
    - "echo '=== GRUB Configuration for Persistent Settings ==='"
    - "mkdir -p /etc/default/grub.d"
    - "echo 'GRUB_CMDLINE_LINUX_DEFAULT=\"\\$GRUB_CMDLINE_LINUX_DEFAULT hugepagesz=2M hugepages=1024\"' > /etc/default/grub.d/hugepages.cfg"
    - "echo 'GRUB_CMDLINE_LINUX_DEFAULT=\"\\$GRUB_CMDLINE_LINUX_DEFAULT nvme_core.multipath=Y\"' > /etc/default/grub.d/nvme-multipath.cfg"
    - "update-grub"
    
  verification:
    - "echo '=== Worker-Specific Verification ==='"
    - "echo 'Hugepages:' && grep HugePages /proc/meminfo"
    - "echo 'Storage modules:' && lsmod | grep -E '(nvme|ext4)' || echo 'Storage modules loaded'"
    
  reboot_message:
    - "echo 'Rebooting server to apply GRUB changes (hugepages, nvme multipath)...'"
