---
# Common setup steps for both control plane and worker nodes
common_setup:
  user_management:
    - "echo '=== User Management Started on $(hostname) ==='"
    - "useradd -m -s /bin/bash ubuntu"
    - "usermod -aG sudo ubuntu"
    - "echo 'ubuntu ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/ubuntu"
    
  ssh_key_setup:
    - "echo '=== SSH Key Setup ==='"
    - "mkdir -p /home/ubuntu/.ssh"
    - "echo '${ssh_public_key}' > /home/ubuntu/.ssh/authorized_keys"
    - "chown -R ubuntu:ubuntu /home/ubuntu/.ssh"
    - "chmod 700 /home/ubuntu/.ssh"
    - "chmod 600 /home/ubuntu/.ssh/authorized_keys"
    
  system_update:
    - "echo '=== System Update ==='"
    - "apt-get update"
    - "apt-get upgrade -y"
    
  package_installation:
    - "echo '=== Package Installation ==='"
    - "apt-get install -y curl wget apt-transport-https ca-certificates gnupg lsb-release software-properties-common unzip jq htop net-tools python3 python3-pip git rsync chrony"
    
  networking_modules:
    - "echo '=== Networking Modules ==='"
    - "modprobe overlay || true"
    - "modprobe br_netfilter || true"
    - "echo 'overlay' >> /etc/modules-load.d/networking.conf"
    - "echo 'br_netfilter' >> /etc/modules-load.d/networking.conf"
    
  sysctl_networking:
    - "echo '=== Network Sysctl Configuration ==='"
    - "cat > /etc/sysctl.d/99-networking.conf << EOF"
    - "net.bridge.bridge-nf-call-iptables = 1"
    - "net.bridge.bridge-nf-call-ip6tables = 1"
    - "net.ipv4.ip_forward = 1"
    - "vm.swappiness = 0"
    - "EOF"
    - "sysctl --system"
    
  disable_swap:
    - "echo '=== Disable Swap ==='"
    - "swapoff -a"
    - "sed -i '/ swap / s/^/#/' /etc/fstab"
    
  time_sync:
    - "echo '=== Time Synchronization Setup ==='"
    - "cat > /etc/chrony/chrony.conf << EOF"
    - "# Use public NTP servers from the pool.ntp.org project"
    - "pool 2.ubuntu.pool.ntp.org iburst"
    - "pool 1.ubuntu.pool.ntp.org iburst"
    - "pool 0.ubuntu.pool.ntp.org iburst"
    - "# Record the rate at which the system clock gains/losses time"
    - "driftfile /var/lib/chrony/drift"
    - "# Allow the system clock to be stepped in the first three updates"
    - "makestep 1.0 3"
    - "# Enable kernel synchronization of the real-time clock (RTC)"
    - "rtcsync"
    - "# Increase the minimum number of selectable sources required to adjust"
    - "minsources 2"
    - "# Allow NTP client access from local network"
    - "allow 10.0.0.0/16"
    - "EOF"
    - "systemctl enable chrony"
    - "systemctl restart chrony"
    
  helm_installation:
    - "echo '=== Helm Installation ==='"
    - "curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3"
    - "chmod 700 get_helm.sh"
    - "./get_helm.sh"
    - "rm get_helm.sh"
    
  ssh_security:
    - "echo '=== SSH Security Configuration ==='"
    - "cat > /etc/ssh/sshd_config.d/99-disable-password-auth.conf << EOF"
    - "PasswordAuthentication no"
    - "PubkeyAuthentication yes"
    - "PermitRootLogin no"
    - "ChallengeResponseAuthentication no"
    - "EOF"
    
  completion_message:
    - "echo '=== Setup Completed on $(hostname) ==='"
    - "echo 'Helm version:' && helm version --short"
    - "echo 'Ubuntu user created with SSH key access'"
    - "echo 'Time sync status:' && chrony sources -v || echo 'Chrony status check failed'"
