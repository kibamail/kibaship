---
# Post-reboot verification steps
post_reboot:
  connection_test:
    - "echo 'SSH connection established to $(hostname) as ubuntu user after reboot'"
    - "echo 'Uptime:' && uptime"
    - "echo 'Verifying post-reboot configuration...'"
    
  hugepages_check:
    - "if [ $(hostname | grep -c worker) -gt 0 ]; then echo 'Hugepages after reboot:' && grep HugePages /proc/meminfo; else echo 'Control plane - no hugepages check needed'; fi"
    
  modules_check:
    - "echo 'Loaded modules:' && lsmod | grep -E '(overlay|br_netfilter)' || echo 'Basic modules loaded'"
    
  time_sync_check:
    - "echo 'Time sync status:' && chrony sources -v || echo 'Chrony not available'"
    - "echo 'System time:' && timedatectl status | grep 'synchronized'"
    
  final_verification:
    - "echo 'Server $(hostname) ready after reboot and configuration verified'"
