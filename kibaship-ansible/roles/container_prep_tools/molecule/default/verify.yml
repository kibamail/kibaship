---
- name: Verify container tools installation and functionality
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Check crictl binary exists
      stat:
        path: /usr/local/bin/crictl
      register: crictl_binary

    - name: Verify crictl binary is installed
      assert:
        that:
          - crictl_binary.stat.exists
          - crictl_binary.stat.executable
          - crictl_binary.stat.mode == '0755'
          - crictl_binary.stat.pw_name == 'root'
        fail_msg: "crictl binary not properly installed at /usr/local/bin/crictl"

    - name: Test crictl version command
      command: /usr/local/bin/crictl --version
      register: crictl_version_output
      changed_when: false

    - name: Verify crictl version is 1.34.0
      assert:
        that:
          - "'crictl version v1.34.0' in crictl_version_output.stdout"
        fail_msg: "crictl version check failed or wrong version installed"

    - name: Check crictl configuration file
      stat:
        path: /etc/crictl.yaml
      register: crictl_config

    - name: Verify crictl configuration exists
      assert:
        that:
          - crictl_config.stat.exists
          - crictl_config.stat.isreg
          - crictl_config.stat.mode == '0644'
        fail_msg: "crictl configuration file not properly created"

    - name: Read crictl configuration
      slurp:
        path: /etc/crictl.yaml
      register: crictl_config_content

    - name: Verify crictl configuration contains containerd socket
      assert:
        that:
          - "'/run/containerd/containerd.sock' in crictl_config_content.content | b64decode"
          - "'timeout: 30' in crictl_config_content.content | b64decode"
        fail_msg: "crictl configuration missing required containerd socket settings"

    - name: Check nerdctl binary exists
      stat:
        path: /usr/local/bin/nerdctl
      register: nerdctl_binary

    - name: Verify nerdctl binary is installed
      assert:
        that:
          - nerdctl_binary.stat.exists
          - nerdctl_binary.stat.executable
          - nerdctl_binary.stat.mode == '0755'
          - nerdctl_binary.stat.pw_name == 'root'
        fail_msg: "nerdctl binary not properly installed at /usr/local/bin/nerdctl"

    - name: Test nerdctl version command
      command: /usr/local/bin/nerdctl version
      register: nerdctl_version_output
      changed_when: false
      failed_when: false

    - name: Verify nerdctl version is 2.1.3
      assert:
        that:
          - "'nerdctl version 2.1.3' in nerdctl_version_output.stdout"
        fail_msg: "nerdctl version check failed or wrong version installed"
      when: nerdctl_version_output.rc == 0

    - name: Check nerdctl configuration directory
      stat:
        path: /etc/nerdctl
      register: nerdctl_config_dir

    - name: Verify nerdctl config directory exists
      assert:
        that:
          - nerdctl_config_dir.stat.exists
          - nerdctl_config_dir.stat.isdir
          - nerdctl_config_dir.stat.mode == '0755'
        fail_msg: "nerdctl configuration directory not properly created"

    - name: Check nerdctl configuration file
      stat:
        path: /etc/nerdctl/nerdctl.toml
      register: nerdctl_config_file

    - name: Verify nerdctl configuration file exists
      assert:
        that:
          - nerdctl_config_file.stat.exists
          - nerdctl_config_file.stat.isreg
          - nerdctl_config_file.stat.mode == '0644'
        fail_msg: "nerdctl configuration file not properly created"

    - name: Test crictl connectivity to containerd (if available)
      command: /usr/local/bin/crictl info
      register: crictl_info_test
      changed_when: false
      failed_when: false

    - name: Check buildkit binary (comes with nerdctl)
      stat:
        path: /usr/local/bin/buildkitd
      register: buildkit_binary

    - name: Check containerd-rootless-setuptool (comes with nerdctl)
      stat:
        path: /usr/local/bin/containerd-rootless-setuptool.sh
      register: rootless_tool

    - name: Check if bash completion is available
      stat:
        path: /etc/bash_completion.d/crictl
      register: crictl_completion

    - name: Check system architecture compatibility
      shell: |
        # Test if binaries are executable (architecture compatibility check)
        /usr/local/bin/crictl --version && /usr/local/bin/nerdctl --help
      register: arch_check
      changed_when: false
      failed_when: false

    - name: Verify tools are built for correct architecture
      assert:
        that:
          - arch_check.rc == 0
        fail_msg: "Container tools may not be built for the correct architecture"

    - name: Final verification summary
      debug:
        msg: |
          ========================================
          CONTAINER TOOLS VERIFICATION COMPLETE
          ========================================
          ✓ crictl: v1.34.0 installed at /usr/local/bin/crictl
          ✓ crictl config: /etc/crictl.yaml (containerd socket configured)
          ✓ nerdctl: v2.1.3 installed at /usr/local/bin/nerdctl
          ✓ nerdctl config: /etc/nerdctl/nerdctl.toml configured
          ✓ buildkitd: {{ 'Available' if buildkit_binary.stat.exists else 'Not available' }}
          ✓ rootless tools: {{ 'Available' if rootless_tool.stat.exists else 'Not available' }}
          ✓ bash completion: {{ 'Installed' if crictl_completion.stat.exists else 'Not installed' }}
          ✓ architecture: Compatible with {{ ansible_architecture }}
          ✓ containerd connectivity: {{ 'Working' if crictl_info_test.rc == 0 else 'containerd not running (expected in containers)' }}
          
          Container CLI tools ready for Kubernetes cluster management!