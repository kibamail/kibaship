---
- name: Remove conflicting system runc packages
  apt:
    name:
      - runc
      - docker-runc
    state: absent
    purge: true

- name: Create temporary directory for runc download
  tempfile:
    state: directory
    suffix: _runc_download
  register: runc_temp_dir

- name: Detect system architecture
  set_fact:
    runc_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

- name: Download runc 1.3.0 binary
  get_url:
    url: "https://github.com/opencontainers/runc/releases/download/v1.3.0/runc.{{ runc_arch }}"
    dest: "{{ runc_temp_dir.path }}/runc"
    mode: '0755'
    timeout: 300
    validate_certs: true
  register: runc_download

- name: Install runc binary to /usr/local/bin
  copy:
    src: "{{ runc_temp_dir.path }}/runc"
    dest: /usr/local/bin/runc
    owner: root
    group: root
    mode: '0755'
    remote_src: true

- name: Clean up temporary directory
  file:
    path: "{{ runc_temp_dir.path }}"
    state: absent

- name: Verify runc installation
  command: /usr/local/bin/runc --version
  register: runc_version_check
  changed_when: false

