---
- name: Verify CNI plugins installation and functionality
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Check CNI bin directory exists
      stat:
        path: /opt/cni/bin
      register: cni_bin_dir

    - name: Verify CNI bin directory is created
      assert:
        that:
          - cni_bin_dir.stat.exists
          - cni_bin_dir.stat.isdir
          - cni_bin_dir.stat.mode == '0755'
        fail_msg: "CNI bin directory not properly created at /opt/cni/bin"

    - name: Check for essential CNI plugin binaries
      stat:
        path: "/opt/cni/bin/{{ item }}"
      register: cni_plugins
      loop:
        - bridge
        - host-local
        - loopback
        - portmap
        - bandwidth
        - firewall
        - tuning
        - vlan
        - macvlan
        - ipvlan
        - dhcp
        - host-device
        - sbr
        - static
        - vrf

    - name: Verify essential CNI plugins are installed
      assert:
        that:
          - item.stat.exists
          - item.stat.executable
          - item.stat.mode == '0755'
        fail_msg: "CNI plugin {{ item.item }} not properly installed"
      loop: "{{ cni_plugins.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Test bridge plugin version
      command: /opt/cni/bin/bridge
      register: bridge_version
      failed_when: false
      changed_when: false

    - name: Verify bridge plugin responds (shows usage or version)
      assert:
        that:
          - bridge_version.rc != 127  # Not 'command not found'
        fail_msg: "Bridge plugin not executable or missing"

    - name: Test host-local IPAM plugin version
      command: /opt/cni/bin/host-local
      register: hostlocal_version  
      failed_when: false
      changed_when: false

    - name: Verify host-local IPAM plugin responds
      assert:
        that:
          - hostlocal_version.rc != 127  # Not 'command not found'
        fail_msg: "Host-local IPAM plugin not executable or missing"

    - name: Check CNI plugins total count
      find:
        paths: /opt/cni/bin
        file_type: file
      register: total_plugins

    - name: Verify minimum plugin count installed
      assert:
        that:
          - total_plugins.matched >= 15  # Should have at least 15 plugins
        fail_msg: "Expected at least 15 CNI plugins, found {{ total_plugins.matched }}"

    - name: Test plugin architecture compatibility
      shell: |
        file /opt/cni/bin/bridge | grep -E "(x86-64|aarch64|ARM aarch64)"
      register: arch_check
      changed_when: false
      failed_when: false

    - name: Verify plugins are built for correct architecture
      assert:
        that:
          - arch_check.rc == 0
        fail_msg: "CNI plugins may not be built for the correct architecture"

    - name: Check for plugin version consistency
      shell: |
        ls -la /opt/cni/bin/ | head -10
      register: plugin_listing
      changed_when: false

    - name: Create test CNI configuration directory
      file:
        path: /etc/cni/net.d
        state: directory
        mode: '0755'

    - name: Create minimal test CNI configuration
      copy:
        content: |
          {
            "cniVersion": "1.0.0",
            "name": "test-bridge",
            "type": "bridge",
            "bridge": "cni-test",
            "isGateway": true,
            "ipMasq": true,
            "ipam": {
              "type": "host-local",
              "subnet": "172.16.0.0/24"
            }
          }
        dest: /tmp/test-cni-config.json
        mode: '0644'

    - name: Verify CNI configuration is valid JSON
      command: python3 -m json.tool /tmp/test-cni-config.json
      register: json_check
      changed_when: false

    - name: Clean up test configuration
      file:
        path: /tmp/test-cni-config.json
        state: absent

    - name: Check system compatibility for bridge operations
      command: which brctl
      register: bridge_utils_check
      failed_when: false
      changed_when: false

    - name: Final verification summary
      debug:
        msg: |
          ========================================
          CNI PLUGINS INSTALLATION VERIFICATION COMPLETE
          ========================================
          ✓ CNI bin directory: /opt/cni/bin (mode: {{ cni_bin_dir.stat.mode }})
          ✓ Total plugins installed: {{ total_plugins.matched }}
          ✓ Essential plugins: bridge, host-local, loopback, portmap, etc.
          ✓ Plugin architecture: Compatible with {{ ansible_architecture }}
          ✓ Configuration directory: /etc/cni/net.d ready
          ✓ Bridge utils: {{ 'Available' if bridge_utils_check.rc == 0 else 'Not installed (may be needed)' }}
          
          CNI plugins v1.7.1 ready for container networking!