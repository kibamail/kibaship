---
# Architecture is now centralized in group_vars/all/versions.yml as host_architecture

- name: Create CNI bin directory
  file:
    path: /opt/cni/bin
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Create CNI configuration directory
  file:
    path: /etc/cni/net.d
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Create temporary directory for CNI plugins download
  tempfile:
    state: directory
    suffix: _cni_download
  register: cni_temp_dir

- name: Download CNI plugins {{ cni_plugins_version }} tarball
  get_url:
    url: "{{ cni_release_url }}/v{{ cni_plugins_version }}/cni-plugins-linux-{{ host_architecture }}-v{{ cni_plugins_version }}.tgz"
    dest: "{{ cni_temp_dir.path }}/cni-plugins.tgz"
    mode: '0644'
    timeout: "{{ download_timeout }}"
    validate_certs: true
  register: cni_download

- name: Extract CNI plugins to /opt/cni/bin
  unarchive:
    src: "{{ cni_temp_dir.path }}/cni-plugins.tgz"
    dest: /opt/cni/bin
    owner: root
    group: root
    mode: '0755'
    remote_src: true

- name: Set executable permissions on all CNI plugins
  file:
    path: /opt/cni/bin
    state: directory
    mode: '0755'
    recurse: true

- name: Clean up temporary directory
  file:
    path: "{{ cni_temp_dir.path }}"
    state: absent

- name: Verify CNI plugins installation
  command: /opt/cni/bin/bridge
  register: cni_bridge_check
  failed_when: false
  changed_when: false

