---
- name: Verify kernel parameter configuration
  hosts: all
  become: false  # Run as root in container directly
  gather_facts: false

  tasks:
    - name: Check if sysctl config file exists
      stat:
        path: /etc/sysctl.d/99-kubernetes.conf
      register: sysctl_file

    - name: Verify sysctl file exists
      assert:
        that:
          - sysctl_file.stat.exists
          - sysctl_file.stat.isreg
        fail_msg: "Kubernetes sysctl config file /etc/sysctl.d/99-kubernetes.conf does not exist"

    - name: Read sysctl file contents
      slurp:
        src: /etc/sysctl.d/99-kubernetes.conf
      register: sysctl_content

    - name: Decode sysctl file content
      set_fact:
        sysctl_config: "{{ sysctl_content.content | b64decode }}"

    - name: Verify IPv4 forwarding is enabled in config
      assert:
        that:
          - "'net.ipv4.ip_forward = 1' in sysctl_config"
        fail_msg: "IPv4 forwarding not enabled in sysctl config"

    - name: Verify bridge netfilter call iptables is enabled in config
      assert:
        that:
          - "'net.bridge.bridge-nf-call-iptables = 1' in sysctl_config"
        fail_msg: "Bridge netfilter call iptables not enabled in sysctl config"

    - name: Verify bridge netfilter call ip6tables is enabled in config
      assert:
        that:
          - "'net.bridge.bridge-nf-call-ip6tables = 1' in sysctl_config"
        fail_msg: "Bridge netfilter call ip6tables not enabled in sysctl config"

    - name: Check if we can read IPv4 forwarding (container-aware)
      shell: cat /proc/sys/net/ipv4/ip_forward 2>/dev/null || echo "unavailable"
      register: ipv4_forward_proc
      changed_when: false

    - name: Final verification summary
      debug:
        msg: |
          ========================================
          KERNEL PARAMETER VERIFICATION COMPLETE  
          ========================================
          ✓ Sysctl config file: /etc/sysctl.d/99-kubernetes.conf exists
          ✓ IPv4 forwarding: configured (proc: {{ ipv4_forward_proc.stdout }})
          ✓ Bridge netfilter iptables: configured in file
          ✓ Bridge netfilter ip6tables: configured in file
          ✓ Role executed successfully
          
          In production: kernel parameters will be applied on real systems.
          In containers: parameters are configured but may not be active.