---
- name: Verify Kubernetes binaries installation and functionality
  hosts: all
  become: true
  gather_facts: true

  tasks:
    # ====================================================================
    # KUBEADM BINARY VERIFICATION
    # ====================================================================
    - name: Check kubeadm binary exists
      stat:
        path: /usr/local/bin/kubeadm
      register: kubeadm_binary

    - name: Verify kubeadm binary is installed
      assert:
        that:
          - kubeadm_binary.stat.exists
          - kubeadm_binary.stat.executable
          - kubeadm_binary.stat.mode == '0755'
          - kubeadm_binary.stat.pw_name == 'root'
        fail_msg: "kubeadm binary not properly installed at /usr/local/bin/kubeadm"

    - name: Test kubeadm version command
      command: /usr/local/bin/kubeadm version --output=short
      register: kubeadm_version_output
      changed_when: false

    - name: Verify kubeadm version is v1.34.0
      assert:
        that:
          - "'v1.34.0' in kubeadm_version_output.stdout"
        fail_msg: "kubeadm version check failed or wrong version installed"

    # ====================================================================
    # KUBELET BINARY VERIFICATION
    # ====================================================================
    - name: Check kubelet binary exists
      stat:
        path: /usr/local/bin/kubelet
      register: kubelet_binary

    - name: Verify kubelet binary is installed
      assert:
        that:
          - kubelet_binary.stat.exists
          - kubelet_binary.stat.executable
          - kubelet_binary.stat.mode == '0755'
          - kubelet_binary.stat.pw_name == 'root'
        fail_msg: "kubelet binary not properly installed at /usr/local/bin/kubelet"

    - name: Test kubelet version command
      command: /usr/local/bin/kubelet --version
      register: kubelet_version_output
      changed_when: false

    - name: Verify kubelet version is v1.34.0
      assert:
        that:
          - "'v1.34.0' in kubelet_version_output.stdout"
        fail_msg: "kubelet version check failed or wrong version installed"

    # ====================================================================
    # KUBECTL BINARY VERIFICATION
    # ====================================================================
    - name: Check kubectl binary exists
      stat:
        path: /usr/local/bin/kubectl
      register: kubectl_binary

    - name: Verify kubectl binary is installed
      assert:
        that:
          - kubectl_binary.stat.exists
          - kubectl_binary.stat.executable
          - kubectl_binary.stat.mode == '0755'
          - kubectl_binary.stat.pw_name == 'root'
        fail_msg: "kubectl binary not properly installed at /usr/local/bin/kubectl"

    - name: Test kubectl version command
      command: /usr/local/bin/kubectl version --client --output=yaml
      register: kubectl_version_output
      changed_when: false

    - name: Verify kubectl version is v1.34.0
      assert:
        that:
          - "'v1.34.0' in kubectl_version_output.stdout"
        fail_msg: "kubectl version check failed or wrong version installed"

    # ====================================================================
    # CRICTL BINARY VERIFICATION (Updated to v1.33.0)
    # ====================================================================
    - name: Check crictl binary exists
      stat:
        path: /usr/local/bin/crictl
      register: crictl_binary

    - name: Verify crictl binary is installed
      assert:
        that:
          - crictl_binary.stat.exists
          - crictl_binary.stat.executable
          - crictl_binary.stat.mode == '0755'
          - crictl_binary.stat.pw_name == 'root'
        fail_msg: "crictl binary not properly installed at /usr/local/bin/crictl"

    - name: Test crictl version command
      command: /usr/local/bin/crictl --version
      register: crictl_version_output
      changed_when: false

    - name: Verify crictl version is v1.33.0
      assert:
        that:
          - "'crictl version v1.33.0' in crictl_version_output.stdout"
        fail_msg: "crictl version check failed or wrong version installed"

    # ====================================================================
    # KUBELET SYSTEMD SERVICE VERIFICATION
    # ====================================================================
    - name: Check kubelet systemd service file exists
      stat:
        path: /etc/systemd/system/kubelet.service
      register: kubelet_service_file

    - name: Verify kubelet service file exists
      assert:
        that:
          - kubelet_service_file.stat.exists
          - kubelet_service_file.stat.isreg
          - kubelet_service_file.stat.mode == '0644'
        fail_msg: "kubelet systemd service file not properly created"

    - name: Check kubelet systemd drop-in directory
      stat:
        path: /etc/systemd/system/kubelet.service.d
      register: kubelet_dropin_dir

    - name: Verify kubelet drop-in directory exists
      assert:
        that:
          - kubelet_dropin_dir.stat.exists
          - kubelet_dropin_dir.stat.isdir
          - kubelet_dropin_dir.stat.mode == '0755'
        fail_msg: "kubelet systemd drop-in directory not properly created"

    - name: Check kubeadm drop-in configuration
      stat:
        path: /etc/systemd/system/kubelet.service.d/10-kubeadm.conf
      register: kubeadm_dropin_file

    - name: Verify kubeadm drop-in configuration exists
      assert:
        that:
          - kubeadm_dropin_file.stat.exists
          - kubeadm_dropin_file.stat.isreg
          - kubeadm_dropin_file.stat.mode == '0644'
        fail_msg: "kubeadm drop-in configuration not properly created"

    # ====================================================================
    # ARCHITECTURE COMPATIBILITY VERIFICATION
    # ====================================================================
    - name: Check system architecture compatibility for binaries
      shell: |
        # Test if binaries are executable (architecture compatibility check)
        /usr/local/bin/kubeadm version --output=short &&
        /usr/local/bin/kubelet --version &&
        /usr/local/bin/kubectl version --client --output=yaml &&
        /usr/local/bin/crictl --version
      register: arch_compatibility_check
      changed_when: false
      failed_when: false

    - name: Verify binaries are built for correct architecture
      assert:
        that:
          - arch_compatibility_check.rc == 0
        fail_msg: "Kubernetes binaries may not be built for the correct architecture"

    # ====================================================================
    # SYSTEMD SERVICE STATUS VERIFICATION
    # ====================================================================
    - name: Check if systemd can load kubelet service
      command: systemctl status kubelet --no-pager
      register: kubelet_service_status
      changed_when: false
      failed_when: false

    - name: Verify kubelet service is recognized by systemd
      assert:
        that:
          - "'could not be found' not in kubelet_service_status.stderr"
          - "'Unit kubelet.service' in kubelet_service_status.stdout or 'kubelet.service' in kubelet_service_status.stdout"
        fail_msg: "kubelet systemd service not properly recognized"

    # ====================================================================
    # FINAL VERIFICATION SUMMARY
    # ====================================================================
    - name: Final verification summary
      debug:
        msg: |
          ========================================
          KUBERNETES BINARIES VERIFICATION COMPLETE
          ========================================
          ✓ kubeadm: v1.34.0 installed at /usr/local/bin/kubeadm
          ✓ kubelet: v1.34.0 installed at /usr/local/bin/kubelet  
          ✓ kubectl: v1.34.0 installed at /usr/local/bin/kubectl
          ✓ crictl: v1.33.0 installed at /usr/local/bin/crictl (updated from v1.34.0)
          ✓ kubelet systemd service: configured in /etc/systemd/system/kubelet.service
          ✓ kubeadm drop-in: configured in /etc/systemd/system/kubelet.service.d/10-kubeadm.conf
          ✓ architecture: Compatible with {{ ansible_architecture }}
          ✓ systemd integration: kubelet service recognized (not started until cluster init)
          
          Kubernetes binaries ready for cluster bootstrapping!