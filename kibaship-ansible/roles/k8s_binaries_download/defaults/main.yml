---
# Kubernetes Binary Download Configuration
# Uses centralized version and path configuration from group_vars/all/

# Versions - inherits from centralized config
k8s_version: "{{ kubernetes_version }}"
critools_version: "{{ crictl_version }}"

# Architecture - uses centralized architecture detection
k8s_arch: "{{ host_architecture }}"

# Binary download URLs - uses centralized base URLs
k8s_download_base_url: "https://dl.k8s.io/release"
critools_download_base_url: "{{ github_url }}/kubernetes-sigs/cri-tools/releases/download"

# Installation paths - uses centralized paths
k8s_bin_dir: "{{ bin_dir }}"
systemd_dir: "{{ systemd_dir }}"
kubelet_config_dir: "{{ kubelet_config_dir }}"

# Download configuration - uses centralized settings
download_retries: "{{ download_retries }}"
download_delay: "{{ download_delay }}"
download_timeout: "{{ download_timeout }}"