---
- name: Detect system architecture for etcd binaries
  set_fact:
    etcd_arch: "{{ etcd_arch_map[ansible_architecture] | default('amd64') }}"

# =======================================================================
# SYSTEM USER AND GROUP CREATION
# =======================================================================

- name: Create etcd system group
  group:
    name: etcd
    state: present
    system: true

- name: Create etcd system user
  user:
    name: etcd
    group: etcd
    system: true
    shell: /bin/false
    home: "{{ etcd_data_dir }}"
    createhome: false
    state: present

# =======================================================================
# DIRECTORY STRUCTURE CREATION
# =======================================================================

- name: Create etcd data directory
  file:
    path: "{{ etcd_data_dir }}"
    state: directory
    owner: etcd
    group: etcd
    mode: '0700'

- name: Create etcd configuration directory
  file:
    path: "{{ etcd_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

# =======================================================================
# ETCD BINARY DOWNLOAD AND INSTALLATION
# =======================================================================

- name: Create temporary directory for etcd download
  tempfile:
    state: directory
    suffix: _etcd_download
  register: etcd_temp_dir

- name: Download etcd {{ etcd_version }} tarball
  get_url:
    url: "{{ etcd_download_base_url }}/v{{ etcd_version }}/etcd-v{{ etcd_version }}-linux-{{ etcd_arch }}.tar.gz"
    dest: "{{ etcd_temp_dir.path }}/etcd.tar.gz"
    mode: '0644'
    timeout: 300
    validate_certs: true
  register: etcd_download

- name: Extract etcd tarball
  unarchive:
    src: "{{ etcd_temp_dir.path }}/etcd.tar.gz"
    dest: "{{ etcd_temp_dir.path }}"
    remote_src: true

- name: Install etcd binary to {{ etcd_bin_dir }}
  copy:
    src: "{{ etcd_temp_dir.path }}/etcd-v{{ etcd_version }}-linux-{{ etcd_arch }}/etcd"
    dest: "{{ etcd_bin_dir }}/etcd"
    owner: root
    group: root
    mode: '0755'
    remote_src: true

- name: Install etcdctl binary to {{ etcd_bin_dir }}
  copy:
    src: "{{ etcd_temp_dir.path }}/etcd-v{{ etcd_version }}-linux-{{ etcd_arch }}/etcdctl"
    dest: "{{ etcd_bin_dir }}/etcdctl"
    owner: root
    group: root
    mode: '0755'
    remote_src: true

- name: Clean up etcd temporary directory
  file:
    path: "{{ etcd_temp_dir.path }}"
    state: absent

# =======================================================================
# TLS CERTIFICATE GENERATION
# =======================================================================

- name: Generate CA private key
  shell: |
    openssl genrsa -out {{ etcd_config_dir }}/ca-key.pem {{ etcd_ca_key_size }}
  args:
    creates: "{{ etcd_config_dir }}/ca-key.pem"

- name: Generate CA certificate
  shell: |
    openssl req -new -x509 -key {{ etcd_config_dir }}/ca-key.pem -out {{ etcd_config_dir }}/ca.pem -days {{ etcd_cert_days }} -subj "/CN=etcd-ca"
  args:
    creates: "{{ etcd_config_dir }}/ca.pem"

- name: Generate etcd server private key
  shell: |
    openssl genrsa -out {{ etcd_config_dir }}/server-key.pem {{ etcd_cert_key_size }}
  args:
    creates: "{{ etcd_config_dir }}/server-key.pem"

- name: Create temporary openssl config for server certificate
  copy:
    content: |
      [req]
      distinguished_name = req_distinguished_name
      req_extensions = v3_req
      prompt = no

      [req_distinguished_name]
      CN = {{ ansible_hostname }}

      [v3_req]
      basicConstraints = CA:FALSE
      keyUsage = nonRepudiation, digitalSignature, keyEncipherment
      subjectAltName = @alt_names

      [alt_names]
      DNS.1 = {{ ansible_hostname }}
      DNS.2 = localhost
      IP.1 = {{ ansible_default_ipv4.address | default('127.0.0.1') }}
      IP.2 = 127.0.0.1
    dest: "{{ etcd_config_dir }}/server-openssl.conf"
    mode: '0644'

- name: Generate etcd server certificate signing request
  shell: |
    openssl req -new -key {{ etcd_config_dir }}/server-key.pem -out {{ etcd_config_dir }}/server.csr -config {{ etcd_config_dir }}/server-openssl.conf
  args:
    creates: "{{ etcd_config_dir }}/server.csr"

- name: Generate etcd server certificate
  shell: |
    openssl x509 -req -in {{ etcd_config_dir }}/server.csr -CA {{ etcd_config_dir }}/ca.pem -CAkey {{ etcd_config_dir }}/ca-key.pem -CAcreateserial \
        -out {{ etcd_config_dir }}/server.pem -days {{ etcd_cert_days }} -extensions v3_req -extfile {{ etcd_config_dir }}/server-openssl.conf
  args:
    creates: "{{ etcd_config_dir }}/server.pem"

- name: Remove temporary openssl config
  file:
    path: "{{ etcd_config_dir }}/server-openssl.conf"
    state: absent

- name: Generate etcd client private key
  shell: |
    openssl genrsa -out {{ etcd_config_dir }}/client-key.pem {{ etcd_cert_key_size }}
  args:
    creates: "{{ etcd_config_dir }}/client-key.pem"

- name: Generate etcd client certificate
  shell: |
    openssl req -new -key {{ etcd_config_dir }}/client-key.pem -out {{ etcd_config_dir }}/client.csr -subj "/CN=etcd-client" && \
    openssl x509 -req -in {{ etcd_config_dir }}/client.csr -CA {{ etcd_config_dir }}/ca.pem -CAkey {{ etcd_config_dir }}/ca-key.pem -CAcreateserial \
        -out {{ etcd_config_dir }}/client.pem -days {{ etcd_cert_days }}
  args:
    creates: "{{ etcd_config_dir }}/client.pem"

- name: Set proper permissions on certificate files
  file:
    path: "{{ item.path }}"
    mode: "{{ item.mode }}"
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
  loop:
    - { path: "{{ etcd_config_dir }}/ca.pem", mode: '0644' }
    - { path: "{{ etcd_config_dir }}/server.pem", mode: '0644' }
    - { path: "{{ etcd_config_dir }}/client.pem", mode: '0644' }
    - { path: "{{ etcd_config_dir }}/ca-key.pem", mode: '0600' }
    - { path: "{{ etcd_config_dir }}/server-key.pem", mode: '0600', owner: 'etcd', group: 'etcd' }
    - { path: "{{ etcd_config_dir }}/client-key.pem", mode: '0600' }

- name: Clean up certificate signing requests
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ etcd_config_dir }}/server.csr"
    - "{{ etcd_config_dir }}/client.csr"

# =======================================================================
# ETCD CONFIGURATION
# =======================================================================

- name: Create etcd configuration file
  copy:
    content: |
      # etcd configuration file
      # Human-readable name for this member
      name: '{{ ansible_hostname }}'
      
      # Path to the data directory
      data-dir: {{ etcd_data_dir }}
      
      # Path to the dedicated wal directory
      wal-dir:
      
      # Number of committed transactions to trigger a snapshot to disk
      snapshot-count: 10000
      
      # Time (in milliseconds) of a heartbeat interval
      heartbeat-interval: 100
      
      # Time (in milliseconds) for an election to timeout
      election-timeout: 1000
      
      # Raise alarms when backend size exceeds the given quota
      quota-backend-bytes: 0
      
      # List of comma separated URLs to listen on for peer traffic
      listen-peer-urls: {{ etcd_listen_peer_urls }}
      
      # List of comma separated URLs to listen on for client traffic
      listen-client-urls: {{ etcd_listen_client_urls }}
      
      # Maximum number of snapshot files to retain (0 is unlimited)
      max-snapshots: 5
      
      # Maximum number of wal files to retain (0 is unlimited)
      max-wals: 5
      
      # Comma-separated white list of origins for CORS
      cors:
      
      # List of this member's peer URLs to advertise to other members
      initial-advertise-peer-urls: {{ etcd_initial_advertise_peer_urls }}
      
      # List of this member's client URLs to advertise to the public
      advertise-client-urls: {{ etcd_advertise_client_urls }}
      
      # Discovery URL used to bootstrap the cluster
      discovery:
      
      # Valid values include 'exit', 'proxy'
      discovery-fallback: 'proxy'
      
      # HTTP proxy to use for traffic to discovery service
      discovery-proxy:
      
      # DNS domain used to bootstrap initial cluster
      discovery-srv:
      
      # Initial cluster configuration for bootstrapping
      initial-cluster: '{{ ansible_hostname }}={{ etcd_initial_advertise_peer_urls }}'
      
      # Initial cluster token for the etcd cluster during bootstrap
      initial-cluster-token: '{{ etcd_initial_cluster_token }}'
      
      # Initial cluster state ('new' or 'existing')
      initial-cluster-state: '{{ etcd_initial_cluster_state }}'
      
      # Reject reconfiguration requests that would cause quorum loss
      strict-reconfig-check: false
      
      # Enable runtime profiling data via HTTP server
      enable-pprof: true
      
      # Valid values include 'on', 'readonly', 'off'
      proxy: 'off'
      
      # Time (in milliseconds) an endpoint will be held in a failed state
      proxy-failure-wait: 5000
      
      # Time (in milliseconds) of the endpoints refresh interval
      proxy-refresh-interval: 30000
      
      # Time (in milliseconds) for a dial to timeout
      proxy-dial-timeout: 1000
      
      # Time (in milliseconds) for a write to timeout
      proxy-write-timeout: 5000
      
      # Time (in milliseconds) for a read to timeout
      proxy-read-timeout: 0
      
      # Path to the client server TLS cert file
      cert-file: {{ etcd_cert_file }}
      
      # Path to the client server TLS key file
      key-file: {{ etcd_key_file }}
      
      # Enable client cert authentication
      client-cert-auth: {{ etcd_client_cert_auth | lower }}
      
      # Path to the client server TLS trusted CA cert file
      trusted-ca-file: {{ etcd_trusted_ca_file }}
      
      # Client TLS using generated certificates
      auto-tls: false
      
      # Path to the peer server TLS cert file
      peer-cert-file: {{ etcd_peer_cert_file }}
      
      # Path to the peer server TLS key file
      peer-key-file: {{ etcd_peer_key_file }}
      
      # Enable peer client cert authentication
      peer-client-cert-auth: {{ etcd_peer_client_cert_auth | lower }}
      
      # Path to the peer server TLS trusted CA cert file
      peer-trusted-ca-file: {{ etcd_peer_trusted_ca_file }}
      
      # Peer TLS using generated certificates
      peer-auto-tls: false
      
      # Enable debug-level logging for etcd
      debug: false
      
      # Specify 'stdout' or 'stderr' to skip journald logging even when running under systemd
      log-outputs: [stderr]
      
      # Force to create a new cluster
      force-new-cluster: false
      
      # auto compaction retention for mvcc key value store
      auto-compaction-retention: "1"
    dest: "{{ etcd_config_dir }}/etcd.conf.yml"
    owner: root
    group: root
    mode: '0644'

# =======================================================================
# SYSTEMD SERVICE CONFIGURATION
# =======================================================================

- name: Create etcd systemd service file
  copy:
    content: |
      [Unit]
      Description=etcd distributed key-value store
      Documentation=https://etcd.io/docs/
      After=network.target
      Wants=network-online.target

      [Service]
      Type=notify
      User=etcd
      Group=etcd
      ExecStart={{ etcd_bin_dir }}/etcd --config-file {{ etcd_config_dir }}/etcd.conf.yml
      Restart=on-failure
      RestartSec=5
      LimitNOFILE=40000
      TimeoutStartSec=0

      [Install]
      WantedBy=multi-user.target
    dest: "{{ systemd_dir }}/etcd.service"
    owner: root
    group: root
    mode: '0644'

# =======================================================================
# VERIFICATION AND STATUS
# =======================================================================

- name: Verify etcd installation
  command: "{{ etcd_bin_dir }}/etcd --version"
  register: etcd_version_check
  changed_when: false

- name: Verify etcdctl installation
  command: "{{ etcd_bin_dir }}/etcdctl version"
  register: etcdctl_version_check
  changed_when: false

- name: Display etcd installation status
  debug:
    msg: |
      etcd Installation Complete:
      ✓ etcd {{ etcd_version }}: {{ 'SUCCESS' if etcd_version in etcd_version_check.stdout else 'FAILED' }}
      ✓ etcdctl {{ etcd_version }}: {{ 'SUCCESS' if etcd_version in etcdctl_version_check.stdout else 'FAILED' }}
      ✓ etcd user: Created (etcd:etcd)
      ✓ data directory: {{ etcd_data_dir }} (mode 0700, owner etcd:etcd)
      ✓ config directory: {{ etcd_config_dir }} (mode 0755, owner root:root)
      ✓ TLS certificates: Generated and configured
      ✓ systemd service: Configured (not started until cluster initialization)
      ✓ Architecture: {{ etcd_arch }} ({{ ansible_architecture }})