---
# os_prep_swap: Disable swap for Kubernetes cluster preparation
# Follows Kubespray's 4-step approach with idempotent behavior

- name: Check if /etc/fstab exists
  stat:
    path: "/etc/fstab"
    get_attributes: false
    get_checksum: false
    get_mime: false
  register: fstab_file

- name: Remove swapfile from /etc/fstab
  ansible.posix.mount:
    name: "{{ item }}"
    fstype: swap
    state: absent
  loop:
    - swap
    - none
  when: fstab_file.stat.exists
  register: fstab_swap_removal

- name: Log fstab swap removal result
  debug:
    msg: "{{ 'Removed swap entries from /etc/fstab' if fstab_swap_removal.changed else 'No swap entries found in /etc/fstab (already clean)' }}"
  when: fstab_file.stat.exists

- name: Log fstab not found
  debug:
    msg: "/etc/fstab does not exist - no swap entries to remove"
  when: not fstab_file.stat.exists

- name: Check if systemctl is available
  command: which systemctl
  register: systemctl_available
  failed_when: false
  changed_when: false

- name: Mask swap.target (persist swapoff)
  ansible.builtin.systemd_service:
    name: swap.target
    masked: true
  register: swap_target_mask
  when: systemctl_available.rc == 0

- name: Log swap.target mask result
  debug:
    msg: "{{ 'Masked swap.target successfully' if swap_target_mask.changed else 'swap.target already masked (idempotent)' }}"
  when: systemctl_available.rc == 0

- name: Log systemctl not available
  debug:
    msg: "systemctl not available - skipping swap.target masking"
  when: systemctl_available.rc != 0

- name: Check if swap devices are active
  shell: cat /proc/swaps | wc -l
  register: swap_count
  changed_when: false

- name: Disable swap immediately
  command: /sbin/swapoff -a
  register: swapoff_result
  failed_when: false
  changed_when: false
  when: swap_count.stdout|int > 1

- name: Log immediate swap disable result
  debug:
    msg: "{{ 'Disabled active swap devices' if swap_count.stdout|int > 1 else 'No active swap devices to disable (already disabled)' }}"