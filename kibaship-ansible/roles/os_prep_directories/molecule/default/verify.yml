---
- name: Verify Kubernetes directories creation
  hosts: all
  become: false  # Run as root in container directly
  gather_facts: false

  tasks:
    - name: Check CNI bin directory exists
      stat:
        path: /opt/cni/bin
      register: cni_bin_dir

    - name: Check Kubernetes config directory exists  
      stat:
        path: /etc/kubernetes
      register: k8s_config_dir

    - name: Check Kubernetes manifests directory exists
      stat:
        path: /etc/kubernetes/manifests
      register: k8s_manifests_dir

    - name: Check kubelet data directory exists
      stat:
        path: /var/lib/kubelet
      register: kubelet_data_dir

    - name: Verify all directories exist
      assert:
        that:
          - cni_bin_dir.stat.exists
          - cni_bin_dir.stat.isdir
          - k8s_config_dir.stat.exists
          - k8s_config_dir.stat.isdir
          - k8s_manifests_dir.stat.exists
          - k8s_manifests_dir.stat.isdir
          - kubelet_data_dir.stat.exists
          - kubelet_data_dir.stat.isdir
        fail_msg: "Required Kubernetes directories are missing"

    - name: Verify directory permissions are 0755
      assert:
        that:
          - cni_bin_dir.stat.mode == '0755'
          - k8s_config_dir.stat.mode == '0755' 
          - k8s_manifests_dir.stat.mode == '0755'
          - kubelet_data_dir.stat.mode == '0755'
        fail_msg: "Directory permissions are not correctly set to 0755"

    - name: Verify directory ownership is root:root
      assert:
        that:
          - cni_bin_dir.stat.uid == 0
          - cni_bin_dir.stat.gid == 0
          - k8s_config_dir.stat.uid == 0
          - k8s_config_dir.stat.gid == 0
          - k8s_manifests_dir.stat.uid == 0
          - k8s_manifests_dir.stat.gid == 0
          - kubelet_data_dir.stat.uid == 0
          - kubelet_data_dir.stat.gid == 0
        fail_msg: "Directory ownership is not root:root"

    - name: Final verification summary
      debug:
        msg: |
          ========================================
          KUBERNETES DIRECTORIES VERIFICATION COMPLETE  
          ========================================
          ✓ /opt/cni/bin: exists, 0755, root:root
          ✓ /etc/kubernetes: exists, 0755, root:root
          ✓ /etc/kubernetes/manifests: exists, 0755, root:root
          ✓ /var/lib/kubelet: exists, 0755, root:root
          
          Directory structure prepared for Kubernetes cluster.