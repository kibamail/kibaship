---
- name: Detect system architecture for containerd
  set_fact:
    containerd_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

- name: Create containerd configuration directory
  file:
    path: /etc/containerd
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Create temporary directory for containerd download
  tempfile:
    state: directory
    suffix: _containerd_download
  register: containerd_temp_dir

- name: Download containerd v2.1.4 tarball
  get_url:
    url: "https://github.com/containerd/containerd/releases/download/v2.1.4/containerd-2.1.4-linux-{{ containerd_arch }}.tar.gz"
    dest: "{{ containerd_temp_dir.path }}/containerd.tar.gz"
    mode: '0644'
    timeout: 300
    validate_certs: true
  register: containerd_download

- name: Extract containerd binaries to /usr/local/bin
  unarchive:
    src: "{{ containerd_temp_dir.path }}/containerd.tar.gz"
    dest: /usr/local
    owner: root
    group: root
    mode: '0755'
    remote_src: true

- name: Generate containerd configuration with version 3 format
  shell: /usr/local/bin/containerd config default
  register: containerd_default_config
  changed_when: false

- name: Create containerd configuration file with Kubernetes optimizations
  copy:
    content: |
      # Containerd v2.1.4 configuration for Kubernetes
      version = 3
      root = "/var/lib/containerd"
      state = "/run/containerd"
      oom_score = 0

      [grpc]
        address = "/run/containerd/containerd.sock"
        uid = 0
        gid = 0

      [debug]
        level = ""

      [metrics]
        address = ""
        grpc_histogram = false

      [cgroup]
        path = ""

      [plugins]
        [plugins."io.containerd.cri.v1.runtime"]
          systemd_cgroup = true
          
          [plugins."io.containerd.cri.v1.runtime".containerd]
            default_runtime_name = "runc"
            
            [plugins."io.containerd.cri.v1.runtime".containerd.runtimes.runc]
              runtime_type = "io.containerd.runc.v2"
              
              [plugins."io.containerd.cri.v1.runtime".containerd.runtimes.runc.options]
                SystemdCgroup = true

          [plugins."io.containerd.cri.v1.runtime".cni]
            bin_dir = "/opt/cni/bin"
            conf_dir = "/etc/cni/net.d"

        [plugins."io.containerd.cri.v1.images"]
          sandbox_image = "registry.k8s.io/pause:3.9"

        [plugins."io.containerd.snapshotter.v1.overlayfs"]
          root_path = "/var/lib/containerd/io.containerd.snapshotter.v1.overlayfs"

        [plugins."io.containerd.differ.v1.walking"]
          root_path = "/var/lib/containerd/io.containerd.differ.v1.walking"
    dest: /etc/containerd/config.toml
    mode: '0644'
    owner: root
    group: root

- name: Download containerd systemd service unit
  get_url:
    url: "https://raw.githubusercontent.com/containerd/containerd/main/containerd.service"
    dest: /etc/systemd/system/containerd.service
    mode: '0644'
    owner: root
    group: root
    timeout: 60
    validate_certs: true

- name: Reload systemd daemon
  systemd:
    daemon_reload: true

- name: Enable and start containerd service
  systemd:
    name: containerd
    state: started
    enabled: true

- name: Wait for containerd socket to be available
  wait_for:
    path: /run/containerd/containerd.sock
    timeout: 30

- name: Clean up temporary directory
  file:
    path: "{{ containerd_temp_dir.path }}"
    state: absent

- name: Verify containerd installation
  command: /usr/local/bin/containerd --version
  register: containerd_version_check
  changed_when: false

- name: Display containerd installation status
  debug:
    msg: "containerd v2.1.4 successfully installed and running"
  when: "'containerd containerd.io 2.1.4' in containerd_version_check.stdout"
