---
- name: Verify containerd installation and functionality
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Check containerd binary exists
      stat:
        path: /usr/local/bin/containerd
      register: containerd_binary

    - name: Verify containerd binary is installed
      assert:
        that:
          - containerd_binary.stat.exists
          - containerd_binary.stat.executable
          - containerd_binary.stat.mode == '0755'
          - containerd_binary.stat.pw_name == 'root'
        fail_msg: "containerd binary not properly installed at /usr/local/bin/containerd"

    - name: Check containerd-shim-runc-v2 binary exists
      stat:
        path: /usr/local/bin/containerd-shim-runc-v2
      register: containerd_shim

    - name: Verify containerd-shim-runc-v2 is installed
      assert:
        that:
          - containerd_shim.stat.exists
          - containerd_shim.stat.executable
        fail_msg: "containerd-shim-runc-v2 not properly installed"

    - name: Check ctr CLI binary exists
      stat:
        path: /usr/local/bin/ctr
      register: ctr_binary

    - name: Verify ctr CLI is installed
      assert:
        that:
          - ctr_binary.stat.exists
          - ctr_binary.stat.executable
        fail_msg: "ctr CLI not properly installed"

    - name: Test containerd version command
      command: /usr/local/bin/containerd --version
      register: containerd_version_output
      changed_when: false

    - name: Verify containerd version is 2.1.4
      assert:
        that:
          - "'containerd containerd.io 2.1.4' in containerd_version_output.stdout"
          - "'revision:' in containerd_version_output.stdout"
        fail_msg: "containerd version check failed or wrong version installed"

    - name: Check containerd configuration directory
      stat:
        path: /etc/containerd
      register: containerd_config_dir

    - name: Verify containerd config directory exists
      assert:
        that:
          - containerd_config_dir.stat.exists
          - containerd_config_dir.stat.isdir
          - containerd_config_dir.stat.mode == '0755'
        fail_msg: "containerd configuration directory not properly created"

    - name: Check containerd configuration file
      stat:
        path: /etc/containerd/config.toml
      register: containerd_config_file

    - name: Verify containerd config file exists
      assert:
        that:
          - containerd_config_file.stat.exists
          - containerd_config_file.stat.isreg
          - containerd_config_file.stat.mode == '0644'
        fail_msg: "containerd configuration file not properly created"

    - name: Read containerd configuration
      slurp:
        path: /etc/containerd/config.toml
      register: containerd_config_content

    - name: Verify containerd configuration format and settings
      assert:
        that:
          - "'version = 3' in containerd_config_content.content | b64decode"
          - "'SystemdCgroup = true' in containerd_config_content.content | b64decode"
          - "'/opt/cni/bin' in containerd_config_content.content | b64decode"
          - "'/etc/cni/net.d' in containerd_config_content.content | b64decode"
        fail_msg: "containerd configuration missing required settings for Kubernetes"

    - name: Check systemd service file
      stat:
        path: /etc/systemd/system/containerd.service
      register: containerd_service

    - name: Verify systemd service file exists
      assert:
        that:
          - containerd_service.stat.exists
          - containerd_service.stat.isreg
        fail_msg: "containerd systemd service file not installed"

    - name: Check if systemd daemon was reloaded (by checking service status)
      systemd:
        name: containerd
        state: started
        enabled: true
      register: containerd_service_status
      failed_when: false

    - name: Verify containerd service is enabled and running
      assert:
        that:
          - containerd_service_status is succeeded
          - containerd_service_status.enabled == true
        fail_msg: "containerd service not properly enabled or started"

    - name: Check containerd socket
      stat:
        path: /run/containerd/containerd.sock
      register: containerd_socket

    - name: Verify containerd CRI socket exists
      assert:
        that:
          - containerd_socket.stat.exists
          - containerd_socket.stat.issock
        fail_msg: "containerd CRI socket not available at /run/containerd/containerd.sock"

    - name: Test CRI endpoint connectivity
      shell: 'echo ''{"method": "Version", "params": []}'' | socat - UNIX-CONNECT:/run/containerd/containerd.sock'
      register: cri_version_test
      failed_when: false
      changed_when: false

    - name: Test ctr command functionality
      command: /usr/local/bin/ctr version
      register: ctr_version_output
      changed_when: false

    - name: Verify ctr can communicate with containerd daemon
      assert:
        that:
          - "'Client:' in ctr_version_output.stdout"
          - "'Server:' in ctr_version_output.stdout"
          - "'containerd.io' in ctr_version_output.stdout"
        fail_msg: "ctr cannot communicate with containerd daemon"

    - name: Test runc integration
      command: /usr/local/bin/ctr run --rm --runtime io.containerd.runc.v2 hello-world:latest test echo "Hello from containerd"
      register: runc_integration_test
      failed_when: false
      changed_when: false

    - name: Check for essential plugins loaded
      shell: /usr/local/bin/ctr plugins ls | grep -E "(cri|runtime|snapshotter)"
      register: plugins_check
      changed_when: false
      failed_when: false

    - name: Verify essential plugins are loaded
      assert:
        that:
          - plugins_check.rc == 0
        fail_msg: "Essential containerd plugins not loaded properly"

    - name: Check system resource limits
      shell: |
        systemctl show containerd.service --property=LimitNOFILE --property=LimitNPROC
      register: resource_limits
      changed_when: false

    - name: Final verification summary
      debug:
        msg: |
          ========================================
          CONTAINERD INSTALLATION VERIFICATION COMPLETE
          ========================================
          ✓ Binary location: /usr/local/bin/containerd (version 2.1.4)
          ✓ Configuration: /etc/containerd/config.toml (version 3, systemd cgroups)
          ✓ Systemd service: enabled and running
          ✓ CRI socket: /run/containerd/containerd.sock (active)
          ✓ CLI tools: ctr, containerd-shim-runc-v2
          ✓ CNI integration: /opt/cni/bin, /etc/cni/net.d configured
          ✓ Runc integration: io.containerd.runc.v2 runtime available
          ✓ Essential plugins: CRI, runtime, snapshotter loaded
          
          containerd v2.1.4 ready for Kubernetes integration!