[defaults]
# Production configuration for kibaship-ansible project
# Optimized for Ubuntu 24.04 Kubernetes deployment

# Inventory and host management
inventory = ./inventory
host_key_checking = False
remote_user = root

# Performance settings
forks = 5
timeout = 30
gather_timeout = 30

# Logging (project-local)
log_path = ./ansible.log
display_ok_hosts = True
display_skipped_hosts = False

# Output formatting
stdout_callback = yaml
stderr_callback = yaml
bin_ansible_callbacks = True

# Ansible Galaxy
galaxy_server_list = community_galaxy,ansible_galaxy

[inventory]
# Enable advanced inventory plugins
enable_plugins = host_list, script, auto, yaml, ini, toml

[privilege_escalation]
# Default privilege escalation for Ubuntu 24.04
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[connection]
# SSH optimizations for testing
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no

[galaxy]
server_list = community_galaxy,ansible_galaxy

[galaxy_server.community_galaxy]
url = https://galaxy.ansible.com/api/v3/

[galaxy_server.ansible_galaxy]
url = https://galaxy.ansible.com/api/v1/