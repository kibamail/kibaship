---
# Kibaship Kubernetes Cluster - Version Configuration
# This file centralizes all version definitions for consistent upgrades

## Kubernetes Core Versions
kubernetes_version: "v1.34.0"
kubeadm_version: "{{ kubernetes_version }}"
kubectl_version: "{{ kubernetes_version }}"
kubelet_version: "{{ kubernetes_version }}"

## Container Runtime Versions
containerd_version: "2.1.4"
runc_version: "1.3.0"
cni_plugins_version: "1.7.1"
crictl_version: "v1.34.0"

## Container Runtime Interface
cri_socket: "unix:///run/containerd/containerd.sock"

## Etcd Version
etcd_version: "3.6.4"

## Network Plugin Versions
# Cilium (primary CNI)
cilium_version: "1.16.2"
cilium_operator_version: "{{ cilium_version }}"
cilium_hubble_version: "{{ cilium_version }}"

# Calico (alternative CNI)
calico_version: "3.28.2"
calico_cni_version: "{{ calico_version }}"
calico_node_version: "{{ calico_version }}"
calico_kube_controllers_version: "{{ calico_version }}"

# Flannel (fallback CNI)
flannel_version: "0.25.7"

## Core DNS
coredns_version: "1.11.1"

## System Components
pause_version: "3.10"

## Image Registry Configuration
# Default registry for Kubernetes components
kube_image_repo: "registry.k8s.io"
gcr_image_repo: "gcr.io"
quay_image_repo: "quay.io"
docker_image_repo: "docker.io"

# Image pull policy
k8s_image_pull_policy: "IfNotPresent"

## Binary Download URLs Base
github_url: "https://github.com"
kubernetes_release_url: "{{ github_url }}/kubernetes/kubernetes/releases/download"
etcd_release_url: "{{ github_url }}/etcd-io/etcd/releases/download"
containerd_release_url: "{{ github_url }}/containerd/containerd/releases/download"
runc_release_url: "{{ github_url }}/opencontainers/runc/releases/download"
cni_release_url: "{{ github_url }}/containernetworking/plugins/releases/download"

## Architecture Configuration
host_architecture: >-
  {%- if ansible_architecture == "aarch64" -%}
  arm64
  {%- elif ansible_architecture == "armv7l" -%}
  arm
  {%- elif ansible_architecture == "x86_64" -%}
  amd64
  {%- else -%}
  {{ ansible_architecture }}
  {%- endif -%}

## OS Configuration
host_os: linux

## Download and Binary Paths
bin_dir: /usr/local/bin
local_release_dir: "/tmp/releases"
download_cache_dir: "/tmp/kubespray_cache"

## Retry and Timeout Configuration
download_retries: 4
download_delay: 10
download_timeout: 300

## Version Compatibility Matrix
# This ensures compatible versions are used together
version_compatibility:
  kubernetes: "{{ kubernetes_version }}"
  containerd: "{{ containerd_version }}"
  etcd: "{{ etcd_version }}"
  cilium: "{{ cilium_version }}"
  coredns: "{{ coredns_version }}"

## Feature Gates (version-specific)
# Kubernetes v1.33 specific feature gates
kube_feature_gates:
  - "RotateKubeletServerCertificate=true"
  - "CSIStorageCapacity=true"
  - "EphemeralContainers=true"

## API Versions
kubeadm_config_api_version: "v1beta3"
kubelet_config_api_version: "v1beta1"
kube_proxy_config_api_version: "v1alpha1"