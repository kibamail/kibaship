---
# Kibaship Kubernetes Cluster Deployment
# Production-ready cluster provisioning with Kubespray-inspired architecture

- name: Gather facts from all nodes
  hosts: k8s_cluster
  gather_facts: true
  become: false
  tasks:
    - name: Collect system information
      setup:
        gather_subset:
          - '!all'
          - network
          - hardware

- name: Prepare all cluster nodes
  hosts: k8s_cluster
  become: true
  any_errors_fatal: true
  serial: "{{ serial | default('100%') }}"
  roles:
    # OS preparation phase - runs on all nodes in parallel
    - { role: os_prep_swap, tags: ['os', 'swap'] }
    - { role: os_prep_directories, tags: ['os', 'directories'] }  
    - { role: os_prep_kernel, tags: ['os', 'kernel'] }
    - { role: os_prep_packages, tags: ['os', 'packages'] }
    
    # Container runtime preparation - runs on all nodes in parallel
    - { role: container_prep_runc, tags: ['container', 'runc'] }
    - { role: container_prep_cni, tags: ['container', 'cni'] }
    - { role: container_prep_containerd, tags: ['container', 'containerd'] }
    - { role: container_prep_tools, tags: ['container', 'tools'] }
    
    # Kubernetes binaries - runs on all nodes in parallel
    - { role: k8s_binaries_download, tags: ['k8s', 'binaries'] }
    - { role: k8s_node_networking, tags: ['k8s', 'networking'] }

- name: Install etcd on control plane nodes
  hosts: kube_control_plane
  become: true
  any_errors_fatal: true
  roles:
    - { role: etcd_install, tags: ['etcd'] }

- name: Initialize Kubernetes cluster
  hosts: kube_control_plane[0]
  become: true
  any_errors_fatal: true
  serial: 1  # Must run on first control plane only
  roles:
    - { role: k8s_cluster_init, tags: ['cluster-init'] }

- name: Join additional control plane nodes
  hosts: kube_control_plane[1:]
  become: true
  any_errors_fatal: true
  serial: 1  # Join control planes one at a time for stability
  roles:
    - { role: k8s_control_plane_join, tags: ['control-plane-join'] }
  when: groups['kube_control_plane'] | length > 1

- name: Join worker nodes to cluster
  hosts: kube_node
  become: true
  any_errors_fatal: true
  serial: "{{ serial | default('100%') }}"  # Workers can join in parallel
  roles:
    - { role: k8s_worker_join, tags: ['worker-join'] }
  when: groups['kube_node'] | default([]) | length > 0

- name: Verify cluster status
  hosts: kube_control_plane[0]
  become: true
  gather_facts: false
  tasks:
    - name: Wait for cluster to be ready
      command: kubectl get nodes
      register: cluster_status
      until: cluster_status.rc == 0
      retries: 30
      delay: 10
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Display cluster information
      debug:
        msg: |
          ==========================================
          KIBASHIP KUBERNETES CLUSTER READY!
          ==========================================
          ✓ Cluster initialization: Complete
          ✓ Control plane nodes: {{ groups['kube_control_plane'] | length }}
          ✓ Worker nodes: {{ groups['kube_node'] | default([]) | length }}
          ✓ Container runtime: containerd
          ✓ Kubernetes version: v1.33.x
          
          Next steps:
          - Install CNI plugin (Cilium)
          - Configure cluster networking
          - Deploy cluster applications
          
          Access cluster: kubectl --kubeconfig /etc/kubernetes/admin.conf get nodes