---
# Kibaship E2E Multi-Node Cluster Inventory
# This inventory will be dynamically generated by the e2e script
# Template structure for HA cluster setup with 3 control planes + 3 workers

all:
  children:
    k8s_cluster:
      children:
        etcd:
          hosts:
            kibaship-e2e-cp-1-TIMESTAMP:
              ansible_host: CP1_PUBLIC_IP_PLACEHOLDER
              main_ip: CP1_PRIVATE_IP_PLACEHOLDER
              main_access_ip: CP1_PUBLIC_IP_PLACEHOLDER
              ansible_user: root
              ansible_ssh_private_key_file: ../e2e/.ssh/kibaship-e2e
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            kibaship-e2e-cp-2-TIMESTAMP:
              ansible_host: CP2_PUBLIC_IP_PLACEHOLDER
              main_ip: CP2_PRIVATE_IP_PLACEHOLDER
              main_access_ip: CP2_PUBLIC_IP_PLACEHOLDER
              ansible_user: root
              ansible_ssh_private_key_file: ../e2e/.ssh/kibaship-e2e
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            kibaship-e2e-cp-3-TIMESTAMP:
              ansible_host: CP3_PUBLIC_IP_PLACEHOLDER
              main_ip: CP3_PRIVATE_IP_PLACEHOLDER
              main_access_ip: CP3_PUBLIC_IP_PLACEHOLDER
              ansible_user: root
              ansible_ssh_private_key_file: ../e2e/.ssh/kibaship-e2e
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
        kube_control_plane:
          hosts:
            kibaship-e2e-cp-1-TIMESTAMP:
              ansible_host: CP1_PUBLIC_IP_PLACEHOLDER
              main_ip: CP1_PRIVATE_IP_PLACEHOLDER
              main_access_ip: CP1_PUBLIC_IP_PLACEHOLDER
              ansible_user: root
              ansible_ssh_private_key_file: ../e2e/.ssh/kibaship-e2e
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            kibaship-e2e-cp-2-TIMESTAMP:
              ansible_host: CP2_PUBLIC_IP_PLACEHOLDER
              main_ip: CP2_PRIVATE_IP_PLACEHOLDER
              main_access_ip: CP2_PUBLIC_IP_PLACEHOLDER
              ansible_user: root
              ansible_ssh_private_key_file: ../e2e/.ssh/kibaship-e2e
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            kibaship-e2e-cp-3-TIMESTAMP:
              ansible_host: CP3_PUBLIC_IP_PLACEHOLDER
              main_ip: CP3_PRIVATE_IP_PLACEHOLDER
              main_access_ip: CP3_PUBLIC_IP_PLACEHOLDER
              ansible_user: root
              ansible_ssh_private_key_file: ../e2e/.ssh/kibaship-e2e
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
        kube_node:
          hosts:
            kibaship-e2e-worker-1-TIMESTAMP:
              ansible_host: W1_PUBLIC_IP_PLACEHOLDER
              main_ip: W1_PRIVATE_IP_PLACEHOLDER
              main_access_ip: W1_PUBLIC_IP_PLACEHOLDER
              ansible_user: root
              ansible_ssh_private_key_file: ../e2e/.ssh/kibaship-e2e
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            kibaship-e2e-worker-2-TIMESTAMP:
              ansible_host: W2_PUBLIC_IP_PLACEHOLDER
              main_ip: W2_PRIVATE_IP_PLACEHOLDER
              main_access_ip: W2_PUBLIC_IP_PLACEHOLDER
              ansible_user: root
              ansible_ssh_private_key_file: ../e2e/.ssh/kibaship-e2e
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
            kibaship-e2e-worker-3-TIMESTAMP:
              ansible_host: W3_PUBLIC_IP_PLACEHOLDER
              main_ip: W3_PRIVATE_IP_PLACEHOLDER
              main_access_ip: W3_PUBLIC_IP_PLACEHOLDER
              ansible_user: root
              ansible_ssh_private_key_file: ../e2e/.ssh/kibaship-e2e
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

# Cluster-level variables
  vars:
    # Kubernetes Configuration
    cluster_name: "kibaship-e2e-cluster"
    kube_version: "v1.33.0"
    
    # Load Balancer Endpoints
    kube_control_plane_endpoint: "KUBE_API_LB_IP_PLACEHOLDER:6443"
    ingress_endpoint: "INGRESS_LB_IP_PLACEHOLDER"
    
    # Network Configuration  
    kube_pods_subnet: "10.244.0.0/16"
    kube_service_addresses: "10.96.0.0/12"
    kube_apiserver_port: 6443
    dns_domain: "cluster.local"
    
    # Multi-master HA settings
    upload_certs: true