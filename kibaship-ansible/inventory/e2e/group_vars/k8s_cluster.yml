---
# Kubernetes cluster-specific configuration
# Applied to all nodes in the k8s_cluster group

# Cluster networking
kube_proxy_mode: ipvs
kube_proxy_strict_arp: true

# Control plane configuration
# Will be dynamically determined based on inventory
kube_control_plane_endpoint: >-
  {%- if groups['kube_control_plane'] | length > 1 -%}
  https://{{ hostvars[groups['kube_control_plane'][0]]['main_access_ip'] }}:{{ kube_apiserver_port }}
  {%- else -%}
  https://{{ hostvars[groups['kube_control_plane'][0]]['main_ip'] }}:{{ kube_apiserver_port }}
  {%- endif -%}

# Certificate SANs (Subject Alternative Names)
supplementary_addresses_in_ssl_keys:
  - "{{ hostvars[groups['kube_control_plane'][0]]['main_access_ip'] }}"
  - "{{ hostvars[groups['kube_control_plane'][0]]['main_ip'] }}"

# Node labels and taints
kube_control_plane_taint: true  # Taint control plane nodes
node_labels: {}
node_taints: []

# Logging and monitoring
kubernetes_audit: false
kubernetes_audit_webhook: false

# Security
anonymous_auth: false
kubelet_authentication_token_webhook: true
kubelet_authorization_mode_webhook: true

# Resource limits
kube_controller_manager_bind_address: 0.0.0.0
kube_scheduler_bind_address: 0.0.0.0

# etcd specific for k8s_cluster
etcd_compaction_retention: "8"
etcd_quota_backend_bytes: "8589934592"  # 8GB
etcd_heartbeat_interval: "250"
etcd_election_timeout: "5000"

# Kubelet configuration
kubelet_max_pods: 110
kubelet_pod_pids_limit: 4096
kubelet_rotate_server_certificates: true