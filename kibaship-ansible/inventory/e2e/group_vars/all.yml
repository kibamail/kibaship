---
# Global variables for all hosts in the cluster
# Kibaship E2E Testing Configuration

# Cluster identification
cluster_name: kibaship-e2e
domain_name: cluster.local

# Network configuration
# These will be dynamically set by e2e script
main_interface: eth0
fallback_ips: true

# Kubernetes configuration
kube_version: v1.33.0
kubeadm_config_api_version: v1beta3

# Container runtime
container_manager: containerd
containerd_version: 2.1.4

# CNI configuration
kube_network_plugin: none  # Will be set to cilium in future
# cni_version: defined in container roles

# etcd configuration  
etcd_deployment_type: kubeadm  # Use kubeadm-managed etcd
etcd_version: 3.5.17

# Certificate configuration
kube_cert_dir: /etc/kubernetes/pki
kube_config_dir: /etc/kubernetes
kube_external_ca_mode: false  # Use internal CA as decided

# Kubelet configuration
kubelet_config_dir: /var/lib/kubelet
kubelet_rotate_certificates: true

# API server configuration
kube_apiserver_port: 6443
kube_apiserver_insecure_port: 0  # Disable insecure port
kube_apiserver_bind_address: 0.0.0.0

# Service and pod network CIDRs
kube_service_addresses: 10.96.0.0/12
kube_pods_subnet: 10.244.0.0/16

# DNS configuration
dns_domain: "{{ domain_name }}"
cluster_ip: 10.96.0.10
enable_coredns: true

# Feature gates and admission plugins
kube_feature_gates: []
kube_apiserver_admission_plugins:
  - NamespaceLifecycle
  - LimitRanger
  - ServiceAccount
  - DefaultStorageClass
  - DefaultTolerationSeconds
  - MutatingAdmissionWebhook
  - ValidatingAdmissionWebhook
  - ResourceQuota
  - NodeRestriction

# Timeout configurations
kubeadm_init_timeout: 600s
kubeadm_join_timeout: 300s

# Binary directories
bin_dir: /usr/local/bin