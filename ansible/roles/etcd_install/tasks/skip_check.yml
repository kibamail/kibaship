---
# Skip check for etcd_install role
- name: Check if etcd is already installed and configured
  block:
    - name: Check etcd service status
      systemd:
        name: etcd
      register: etcd_service
      failed_when: false

    - name: Check etcd binary
      stat:
        path: /usr/local/bin/etcd
      register: etcd_binary

    - name: Check etcd configuration
      stat:
        path: /etc/etcd/etcd.conf
      register: etcd_config

    - name: Test etcd health
      shell: ETCDCTL_API=3 /usr/local/bin/etcdctl --endpoints=localhost:2379 endpoint health
      register: etcd_health_check
      changed_when: false
      failed_when: false
      environment:
        ETCDCTL_CACERT: /etc/ssl/etcd/ssl/ca.pem
        ETCDCTL_CERT: /etc/ssl/etcd/ssl/member-{{ inventory_hostname }}.pem
        ETCDCTL_KEY: /etc/ssl/etcd/ssl/member-{{ inventory_hostname }}-key.pem
      when: 
        - etcd_service.status is defined
        - etcd_service.status.ActiveState == "active"

    - name: Set skip flag if etcd is properly configured and healthy
      set_fact:
        skip_this_role: true
      when: 
        - etcd_binary.stat.exists
        - etcd_config.stat.exists
        - etcd_service.status is defined
        - etcd_service.status.ActiveState == "active"
        - etcd_health_check.rc == 0

    - name: Display skip decision for etcd installation
      debug:
        msg: |
          {% if skip_this_role | default(false) %}
          ✅ SKIPPING etcd_install: etcd is already installed, configured, and healthy
          {% else %}
          ⚡ EXECUTING etcd_install: etcd needs to be installed/configured
          {% endif %}
          - Binary exists: {{ etcd_binary.stat.exists | default(false) }}
          - Config exists: {{ etcd_config.stat.exists | default(false) }}
          - Service active: {{ (etcd_service.status.ActiveState == 'active') | default(false) }}
          - Health check passed: {{ (etcd_health_check.rc == 0) | default(false) }}

  rescue:
    - name: Force role execution due to check failure
      set_fact:
        skip_this_role: false
      
    - name: Log skip check failure
      debug:
        msg: "etcd_install skip check failed, will execute role fully"