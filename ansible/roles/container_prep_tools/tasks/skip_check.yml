---
# Skip check for container_prep_tools role
- name: Check if container tools are already installed
  block:
    - name: Check crictl binary
      stat:
        path: /usr/local/bin/crictl
      register: crictl_binary

    - name: Test crictl functionality
      command: crictl --version
      register: crictl_version_check
      changed_when: false
      failed_when: false
      when: crictl_binary.stat.exists

    - name: Check crictl configuration
      stat:
        path: /etc/crictl.yaml
      register: crictl_config

    - name: Set skip flag if container tools are properly installed
      set_fact:
        skip_this_role: true
      when: 
        - crictl_binary.stat.exists
        - crictl_version_check.rc == 0
        - crictl_config.stat.exists

    - name: Display skip decision for container tools preparation
      debug:
        msg: |
          {% if skip_this_role | default(false) %}
          ✅ SKIPPING container_prep_tools: Container tools are already installed and configured
          {% else %}
          ⚡ EXECUTING container_prep_tools: Container tools need to be installed/configured
          {% endif %}
          - crictl binary exists: {{ crictl_binary.stat.exists | default(false) }}
          - crictl functional: {{ (crictl_version_check.rc == 0) | default(false) }}
          - crictl config exists: {{ crictl_config.stat.exists | default(false) }}

  rescue:
    - name: Force role execution due to check failure
      set_fact:
        skip_this_role: false
      
    - name: Log skip check failure
      debug:
        msg: "container_prep_tools skip check failed, will execute role fully"