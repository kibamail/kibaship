---
# Architecture is now centralized in group_vars/all/versions.yml as host_architecture

- name: Skip check for redundant steps
  include_tasks: skip_check.yml
  when: skip_redundant_steps | default(false)

- name: Skip role execution if already completed
  meta: end_play
  when: 
    - skip_redundant_steps | default(false)
    - skip_this_role | default(false)

# =======================================================================
# CRICTL INSTALLATION (CRI CLI Tool) - {{ crictl_version }}
# =======================================================================

- name: Create temporary directory for crictl download
  tempfile:
    state: directory
    suffix: _crictl_download
  register: crictl_temp_dir

- name: Download crictl {{ crictl_version }} tarball
  get_url:
    url: "{{ github_url }}/kubernetes-sigs/cri-tools/releases/download/{{ crictl_version }}/crictl-{{ crictl_version }}-linux-{{ host_architecture }}.tar.gz"
    dest: "{{ crictl_temp_dir.path }}/crictl.tar.gz"
    mode: '0644'
    timeout: "{{ download_timeout }}"
    validate_certs: true
  register: crictl_download

- name: Extract crictl binary
  unarchive:
    src: "{{ crictl_temp_dir.path }}/crictl.tar.gz"
    dest: "{{ crictl_temp_dir.path }}"
    remote_src: true

- name: Install crictl binary to /usr/local/bin
  copy:
    src: "{{ crictl_temp_dir.path }}/crictl"
    dest: "{{ bin_dir }}/crictl"
    owner: root
    group: root
    mode: '0755'
    remote_src: true

- name: Create crictl configuration file
  copy:
    content: |
      runtime-endpoint: {{ cri_socket }}
      image-endpoint: {{ cri_socket }}
      timeout: 30
    dest: /etc/crictl.yaml
    owner: root
    group: root
    mode: '0644'

- name: Clean up crictl temporary directory
  file:
    path: "{{ crictl_temp_dir.path }}"
    state: absent

- name: Create bash completion directory
  file:
    path: /etc/bash_completion.d
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Install crictl bash completion
  shell: /usr/local/bin/crictl completion bash > /etc/bash_completion.d/crictl
  args:
    creates: /etc/bash_completion.d/crictl

# =======================================================================
# NERDCTL INSTALLATION (Docker-compatible CLI) - v2.1.3
# =======================================================================

- name: Create temporary directory for nerdctl download
  tempfile:
    state: directory
    suffix: _nerdctl_download
  register: nerdctl_temp_dir

- name: Download nerdctl v2.1.3 tarball
  get_url:
    url: "https://github.com/containerd/nerdctl/releases/download/v2.1.3/nerdctl-2.1.3-linux-{{ host_architecture }}.tar.gz"
    dest: "{{ nerdctl_temp_dir.path }}/nerdctl.tar.gz"
    mode: '0644'
    timeout: 300
    validate_certs: true
  register: nerdctl_download

- name: Extract nerdctl tarball
  unarchive:
    src: "{{ nerdctl_temp_dir.path }}/nerdctl.tar.gz"
    dest: "{{ nerdctl_temp_dir.path }}"
    remote_src: true

- name: Install nerdctl binary to /usr/local/bin
  copy:
    src: "{{ nerdctl_temp_dir.path }}/nerdctl"
    dest: /usr/local/bin/nerdctl
    owner: root
    group: root
    mode: '0755'
    remote_src: true

- name: Install additional nerdctl tools (buildkitd, containerd-rootless-setuptool.sh, etc.)
  shell: |
    find "{{ nerdctl_temp_dir.path }}" -type f -executable -not -name "nerdctl" -not -name "*.tar.gz" -exec cp {} /usr/local/bin/ \;
    chmod 755 /usr/local/bin/*

- name: Create nerdctl configuration directory
  file:
    path: /etc/nerdctl
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Create nerdctl configuration file
  copy:
    content: |
      # nerdctl configuration for Kubernetes integration
      debug = false
      debug_full = false
      address = "/run/containerd/containerd.sock"
      namespace = "k8s.io"
      snapshotter = "overlayfs"
      cgroup_manager = "systemd"
    dest: /etc/nerdctl/nerdctl.toml
    owner: root
    group: root
    mode: '0644'

- name: Clean up nerdctl temporary directory
  file:
    path: "{{ nerdctl_temp_dir.path }}"
    state: absent

- name: Install nerdctl bash completion
  shell: /usr/local/bin/nerdctl completion bash > /etc/bash_completion.d/nerdctl
  args:
    creates: /etc/bash_completion.d/nerdctl

# =======================================================================
# VERIFICATION AND STATUS
# =======================================================================

- name: Verify crictl installation
  command: /usr/local/bin/crictl --version
  register: crictl_version_check
  changed_when: false

- name: Verify nerdctl installation
  command: /usr/local/bin/nerdctl version
  register: nerdctl_version_check
  changed_when: false
  failed_when: false

