---
# Skip check for container_prep_cni role
- name: Check if CNI plugins are already installed
  block:
    - name: Check for essential CNI binaries
      stat:
        path: "{{ item }}"
      register: cni_binaries
      loop:
        - /opt/cni/bin/bridge
        - /opt/cni/bin/loopback
        - /opt/cni/bin/portmap
        - /opt/cni/bin/bandwidth
        - /opt/cni/bin/firewall

    - name: Test CNI bridge plugin functionality
      command: /opt/cni/bin/bridge
      register: cni_bridge_test
      changed_when: false
      failed_when: false
      when: cni_binaries.results[0].stat.exists

    - name: Count available CNI binaries
      set_fact:
        available_cni_binaries: "{{ cni_binaries.results | selectattr('stat.exists') | list | length }}"
        total_cni_binaries: "{{ cni_binaries.results | length }}"

    - name: Set skip flag if CNI plugins are properly installed
      set_fact:
        skip_this_role: true
      when: 
        - available_cni_binaries | int == total_cni_binaries | int
        - cni_bridge_test.rc == 1  # Bridge plugin returns 1 when run without config (expected)

    - name: Display skip decision for CNI preparation
      debug:
        msg: |
          {% if skip_this_role | default(false) %}
          ✅ SKIPPING container_prep_cni: CNI plugins are already installed and functional
          {% else %}
          ⚡ EXECUTING container_prep_cni: CNI plugins need to be installed/configured
          {% endif %}
          - Available CNI binaries: {{ available_cni_binaries | default('unknown') }}/{{ total_cni_binaries | default('unknown') }}
          - Bridge plugin functional: {{ (cni_bridge_test.rc == 1) | default(false) }}

  rescue:
    - name: Force role execution due to check failure
      set_fact:
        skip_this_role: false
      
    - name: Log skip check failure
      debug:
        msg: "container_prep_cni skip check failed, will execute role fully"