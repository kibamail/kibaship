---
# Skip check for os_prep_packages role
- name: Check if required packages are already installed
  block:
    - name: Check for required system packages
      command: dpkg-query -W -f='${Status}\n' {{ item }}
      register: package_status
      failed_when: false
      changed_when: false
      loop:
        - curl
        - wget
        - socat
        - conntrack
        - ipset
        - apt-transport-https
        - ca-certificates
        - gnupg
        - lsb-release

    - name: Count installed packages
      set_fact:
        installed_packages: "{{ package_status.results | selectattr('stdout', 'search', 'install ok installed') | list | length }}"
        total_packages: "{{ package_status.results | length }}"

    - name: Set skip flag if all packages are installed
      set_fact:
        skip_this_role: true
      when: installed_packages | int == total_packages | int

    - name: Display skip decision for package preparation
      debug:
        msg: |
          Skip os_prep_packages: {{ skip_this_role | default(false) }}
          - Installed packages: {{ installed_packages | default('unknown') }}/{{ total_packages | default('unknown') }}
          Missing packages:
          {% for result in package_status.results %}
          {% if 'install ok installed' not in result.stdout %}
          - {{ result.item }}
          {% endif %}
          {% endfor %}

  rescue:
    - name: Force role execution due to check failure
      set_fact:
        skip_this_role: false
      
    - name: Log skip check failure
      debug:
        msg: "os_prep_packages skip check failed, will execute role fully"