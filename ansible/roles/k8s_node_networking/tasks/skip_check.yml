---
# Skip check for k8s_node_networking role
- name: Check if Kubernetes networking is already configured
  block:
    - name: Check networking configuration files
      stat:
        path: "{{ item }}"
      register: networking_configs
      loop:
        - /etc/sysctl.d/99-kubernetes-networking.conf
        - /etc/modules-load.d/kubespray-br_netfilter.conf

    - name: Check if networking sysctl values are applied
      shell: sysctl -n {{ item }} 2>/dev/null || echo "0"
      register: sysctl_values
      changed_when: false
      failed_when: false
      loop:
        - net.bridge.bridge-nf-call-iptables
        - net.bridge.bridge-nf-call-ip6tables
        - net.ipv4.ip_forward

    - name: Check if required modules are loaded
      shell: lsmod | grep -E '^(br_netfilter|overlay)' | wc -l
      register: loaded_modules
      changed_when: false
      failed_when: false

    - name: Set skip flag if networking is properly configured
      set_fact:
        skip_this_role: true
      when: 
        - networking_configs.results | map(attribute='stat.exists') | list | unique == [true]
        - sysctl_values.results | map(attribute='stdout') | map('int') | list | unique == [1]
        - loaded_modules.stdout | int >= 2

    - name: Display skip decision for k8s node networking
      debug:
        msg: |
          {% if skip_this_role | default(false) %}
          ✅ SKIPPING k8s_node_networking: Kubernetes networking is already configured
          {% else %}
          ⚡ EXECUTING k8s_node_networking: Kubernetes networking needs to be configured
          {% endif %}
          - Config files exist: {{ (networking_configs.results | map(attribute='stat.exists') | list | unique == [true]) | default(false) }}
          - Sysctl values correct: {{ (sysctl_values.results | map(attribute='stdout') | map('int') | list | unique == [1]) | default(false) }}
          - Modules loaded: {{ loaded_modules.stdout | default('unknown') }}/2

  rescue:
    - name: Force role execution due to check failure
      set_fact:
        skip_this_role: false
      
    - name: Log skip check failure
      debug:
        msg: "k8s_node_networking skip check failed, will execute role fully"