---
# Configure essential kernel networking modules for Kubernetes nodes with Cilium kube-proxy replacement
# Based on Kubespray's kubernetes/node role, optimized for Cilium proxy replacement

- name: Verify if br_netfilter module exists (container-safe)
  ansible.builtin.command: "modinfo br_netfilter"
  environment:
    PATH: "{{ ansible_env.PATH }}:/sbin"
  register: modinfo_br_netfilter
  failed_when: false
  changed_when: false
  check_mode: false

- name: Verify br_netfilter module path exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /etc/modules-load.d
    - /etc/modprobe.d

- name: Enable br_netfilter module (container-safe)
  community.general.modprobe:
    name: br_netfilter
    state: present
  when: modinfo_br_netfilter.rc == 0
  failed_when: false

- name: Persist br_netfilter module configuration
  ansible.builtin.template:
    src: "{{ role_path }}/templates/kubespray-br_netfilter.conf.j2"
    dest: /etc/modules-load.d/kubespray-br_netfilter.conf
    mode: "0644"
    backup: true

- name: Check if bridge-nf-call-iptables key exists (container-safe)
  ansible.builtin.command: "sysctl net.bridge.bridge-nf-call-iptables"
  failed_when: false
  changed_when: false
  check_mode: false
  register: sysctl_bridge_nf_call_iptables

- name: Configure bridge netfilter sysctls for Kubernetes
  ansible.builtin.template:
    src: "{{ role_path }}/templates/99-kubernetes-networking.conf.j2"
    dest: "{{ k8s_networking_sysctl_file }}"
    mode: "0644"
    backup: true
  register: sysctl_configured