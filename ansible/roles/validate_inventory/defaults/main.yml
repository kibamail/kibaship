---
# validate_inventory role defaults

# Validation settings
validate_strict: true
validate_network_cidrs: true

# Minimum cluster requirements (not HA-specific)
min_control_plane_nodes: 1
min_worker_nodes: 1

# Required variables checklist
required_global_vars:
  - kube_control_plane_endpoint  # Domain/IP:port for API access (replaces separate domain var)
  - kube_load_balancer_public_ip # Public IP for certificate SANs
  - kube_service_addresses       # Service network CIDR
  - kube_pods_subnet            # Pod network CIDR

optional_global_vars:
  - kube_load_balancer_private_ip  # Private IP for internal communication

required_host_vars:
  - main_ip  # Internal IP for cluster communication

# Validation patterns
valid_ip_pattern: '^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$'
valid_cidr_pattern: '^(?:[0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'