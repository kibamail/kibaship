---
# k8s_cluster_init: Initialize Kubernetes cluster with kubeadm
# Based on Kubespray's kubernetes/control-plane role
# Runs only on the first control plane node (kube_control_plane[0])

- name: Check if this is the first control plane node
  assert:
    that:
      - inventory_hostname == groups['kube_control_plane'][0]
    fail_msg: 'This role should only run on the first control plane node'
    success_msg: 'Running cluster initialization on first control plane node'

- name: Check if kubeadm has already initialized the cluster
  stat:
    path: /etc/kubernetes/admin.conf
    get_attributes: false
    get_checksum: false
    get_mime: false
  register: kubeadm_already_run

- name: Generate certificate key for HA setup
  command: kubeadm certs certificate-key
  register: certificate_key_result
  when:
    - groups['kube_control_plane'] | length > 1
    - not kubeadm_already_run.stat.exists
  changed_when: false

- name: Set certificate key fact
  set_fact:
    kubeadm_certificate_key: '{{ certificate_key_result.stdout }}'
  when:
    - groups['kube_control_plane'] | length > 1
    - certificate_key_result is defined
    - certificate_key_result.stdout is defined

- name: Create kubeadm config directory
  file:
    path: '{{ kube_config_dir }}'
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Generate kubeadm configuration
  template:
    src: 'kubeadm-config.{{ kubeadm_config_api_version }}.yaml.j2'
    dest: '{{ kube_config_dir }}/kubeadm-config.yaml'
    mode: '0640'
    owner: root
    group: root
    backup: true

- name: Initialize Kubernetes cluster with kubeadm
  command: >-
    timeout {{ kubeadm_init_timeout }}
    kubeadm init
    --config={{ kube_config_dir }}/kubeadm-config.yaml
    {% if kubeadm_ignore_preflight_errors | length > 0 %}
    --ignore-preflight-errors={{ kubeadm_ignore_preflight_errors | join(',') }}
    {% endif %}
    {% if kubeadm_init_phases_skip | length > 0 %}
    --skip-phases={{ kubeadm_init_phases_skip | join(',') }}
    {% endif %}
    {% if upload_certs %}
    --upload-certs
    {% endif %}
  environment:
    PATH: '{{ bin_dir }}:{{ ansible_env.PATH }}'
  when: not kubeadm_already_run.stat.exists
  register: kubeadm_init_result
  failed_when:
    - kubeadm_init_result.rc != 0
    - '"field is immutable" not in kubeadm_init_result.stderr'

- name: Create .kube directory for root user
  file:
    path: /root/.kube
    state: directory
    mode: '0700'
    owner: root
    group: root

- name: Copy admin.conf to root's kube config
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    owner: root
    group: root
    mode: '0600'

- name: Wait for API server to be ready
  uri:
    url: "https://{{ hostvars[inventory_hostname]['ip'] }}:{{ kube_apiserver_port }}/healthz"
    method: GET
    validate_certs: false
    status_code: 200
  register: api_server_check
  until: api_server_check.status == 200
  retries: 30
  delay: 10

- name: Extract load balancer domain from control plane endpoint
  set_fact:
    lb_domain: "{{ kube_control_plane_endpoint.split(':')[0] }}"
    lb_expected_ip: '{{ kube_load_balancer_public_ip }}'
  when: groups['kube_control_plane'] | length > 1 or groups['kube_node'] | default([]) | length > 0

- name: Display DNS propagation check information
  debug:
    msg: |
      ==========================================
      DNS PROPAGATION CHECK REQUIRED
      ==========================================
      Load Balancer Domain: {{ lb_domain | default('N/A') }}
      Expected IP Address: {{ lb_expected_ip | default('N/A') }}

      Before proceeding with token creation, we must ensure the load balancer
      domain resolves to the correct IP address. This prevents kubeadm token
      operations from failing due to DNS propagation delays.

      This check will retry up to 30 times with 30-second intervals (15 minutes total).
  when:
    - groups['kube_control_plane'] | length > 1 or groups['kube_node'] | default([]) | length > 0
    - lb_domain is defined

- name: Wait for load balancer DNS propagation
  shell: |
    # Perform DNS lookup and extract IPv4 addresses
    resolved_ips=$(nslookup {{ lb_domain }} | grep -A 10 "Non-authoritative answer:" | grep "Address:" | awk '{print $2}' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

    if [ -z "$resolved_ips" ]; then
      echo "DNS_LOOKUP_FAILED: No IPv4 address resolved for {{ lb_domain }}"
      exit 1
    fi

    if [ "$resolved_ips" = "{{ lb_expected_ip }}" ]; then
      echo "DNS_MATCH_SUCCESS: {{ lb_domain }} resolves to {{ lb_expected_ip }}"
      exit 0
    else
      echo "DNS_MISMATCH: {{ lb_domain }} resolves to $resolved_ips, expected {{ lb_expected_ip }}"
      exit 1
    fi
  register: dns_check_result
  until: dns_check_result.rc == 0
  retries: 30
  delay: 30
  changed_when: false
  failed_when: false
  when:
    - groups['kube_control_plane'] | length > 1 or groups['kube_node'] | default([]) | length > 0
    - lb_domain is defined
    - lb_expected_ip is defined

- name: Display DNS propagation status
  debug:
    msg: |
      ==========================================
      DNS PROPAGATION CHECK RESULTS
      ==========================================
      {% if dns_check_result.rc == 0 %}
      ✅ SUCCESS: DNS propagation completed successfully!
      Domain: {{ lb_domain }}
      Resolved IP: {{ lb_expected_ip }}
      Status: {{ dns_check_result.stdout_lines[-1] if dns_check_result.stdout_lines else 'Unknown' }}

      Proceeding with cluster token operations...
      {% else %}
      ❌ FAILED: DNS propagation check failed after 30 attempts (15 minutes)
      Domain: {{ lb_domain }}
      Expected IP: {{ lb_expected_ip }}
      Last Status: {{ dns_check_result.stdout_lines[-1] if dns_check_result.stdout_lines else 'No output' }}

      This likely indicates:
      1. DNS records not yet propagated globally
      2. Load balancer not properly configured
      3. Domain configuration issues

      Manual verification: nslookup {{ lb_domain }}
      {% endif %}
  when:
    - groups['kube_control_plane'] | length > 1 or groups['kube_node'] | default([]) | length > 0
    - dns_check_result is defined

- name: Fail if DNS propagation check failed
  fail:
    msg: |
      DNS propagation check failed after maximum retries. Cannot proceed with
      cluster token operations until {{ lb_domain }} resolves to {{ lb_expected_ip }}.

      Please verify:
      1. Load balancer is properly provisioned and healthy
      2. DNS records are configured correctly
      3. DNS propagation has completed

      You can manually verify with: nslookup {{ lb_domain }}
  when:
    - groups['kube_control_plane'] | length > 1 or groups['kube_node'] | default([]) | length > 0
    - dns_check_result is defined
    - dns_check_result.rc != 0

- name: Get cluster join token
  command: kubeadm token create --print-join-command
  register: kubeadm_join_command
  changed_when: false
  when: groups['kube_control_plane'] | length > 1 or groups['kube_node'] | default([]) | length > 0

- name: Extract join token from command
  set_fact:
    kubeadm_token: "{{ kubeadm_join_command.stdout | regex_search('--token ([^ ]+)', '\\1') | first }}"
    kubeadm_discovery_token_ca_cert_hash: "{{ kubeadm_join_command.stdout | regex_search('--discovery-token-ca-cert-hash ([^ ]+)', '\\1') | first }}"
  when: kubeadm_join_command is defined and kubeadm_join_command.stdout is defined

- name: Store cluster join information for other nodes
  set_fact:
    cluster_join_info:
      token: "{{ kubeadm_token | default('') }}"
      discovery_token_ca_cert_hash: "{{ kubeadm_discovery_token_ca_cert_hash | default('') }}"
      certificate_key: "{{ kubeadm_certificate_key | default('') }}"
      control_plane_endpoint: "{{ hostvars[inventory_hostname]['ip'] }}:{{ kube_apiserver_port }}"
  when: kubeadm_join_command is defined

- name: Verify cluster status
  command: kubectl get nodes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cluster_nodes
  changed_when: false

- name: Display cluster initialization results
  debug:
    msg: |
      ==============================================
      KUBERNETES CLUSTER INITIALIZED SUCCESSFULLY
      ==============================================
      ✓ Cluster Name: {{ cluster_name }}
      ✓ Kubernetes Version: {{ kube_version }}
      ✓ Control Plane Endpoint: {{ hostvars[inventory_hostname]['ip'] }}:{{ kube_apiserver_port }}
      ✓ Service Network: {{ kube_service_addresses }}
      ✓ Pod Network: {{ kube_pods_subnet }}
      {% if upload_certs %}
      ✓ HA Configuration: Enabled ({{ groups['kube_control_plane'] | length }} control plane nodes planned)
      {% endif %}

      Cluster Nodes:
      {{ cluster_nodes.stdout }}

      Next Steps:
      - Additional control plane nodes will join using certificate key
      - Worker nodes will join using token authentication
      - CNI plugin (Cilium) installation required for pod networking
