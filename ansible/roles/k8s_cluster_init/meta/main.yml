---
# k8s_cluster_init role metadata

galaxy_info:
  author: Claude-SRE (Kibaship Project)
  description: Initialize Kubernetes cluster using kubeadm for the first control plane node
  company: Kibaship
  license: MIT
  min_ansible_version: '2.14'
  
  platforms:
    - name: Ubuntu
      versions:
        - '24.04'
  
  galaxy_tags:
    - kubernetes
    - kubeadm
    - cluster-init
    - control-plane

dependencies:
  - role: os_prep_swap
  - role: os_prep_directories
  - role: os_prep_kernel
  - role: os_prep_packages
  - role: container_prep_runc
  - role: container_prep_cni
  - role: container_prep_containerd
  - role: container_prep_tools
  - role: k8s_binaries_download
  - role: k8s_node_networking
  - role: etcd_install