apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self-managed
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/part-of: kibaship-platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # =============================================================================
  # Self-Managed Argo CD Application
  # =============================================================================
  # This application allows Argo CD to manage itself using GitOps, including
  # automatic namespace creation and environment-specific configurations
  
  project: default
  source:
    repoURL: https://github.com/kibamail/kibaship
    targetRevision: HEAD
    path: clusters/argocd/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
  retry:
    limit: 5
    backoff:
      duration: 5s
      factor: 2
      maxDuration: 3m
