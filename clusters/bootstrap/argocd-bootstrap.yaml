apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-bootstrap
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-bootstrap
    app.kubernetes.io/part-of: kibaship-platform
spec:
  # =============================================================================
  # Argo CD Bootstrap Application
  # =============================================================================
  # This application manages Argo CD itself and the ApplicationSets that
  # deploy platform operators across environments
  
  project: default
  source:
    repoURL: https://github.com/kibamail/kibaship
    targetRevision: HEAD
    path: clusters/bootstrap/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
