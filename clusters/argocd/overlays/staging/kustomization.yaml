apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# =============================================================================
# Argo CD Staging Environment Overlay
# =============================================================================
# This overlay customizes the base Argo CD installation for the staging
# environment with staging-specific configurations

namespace: argocd

resources:
  - ../../base

patchesStrategicMerge:
  - argocd-server-patch.yaml

# Staging-specific labels
commonLabels:
  environment: staging
  cluster: staging
