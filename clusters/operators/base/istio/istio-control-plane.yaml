apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: kibaship-control-plane
  namespace: istio-system
spec:
  # =============================================================================
  # Istio Control Plane Configuration for kibaship PaaS
  # =============================================================================
  # This configuration sets up Istio for multi-tenant customer isolation
  # with proper ingress gateway configuration for the PaaS platform
  
  values:
    global:
      # Enable strict mTLS for enhanced security between services
      meshConfig:
        defaultConfig:
          proxyStatsMatcher:
            inclusionRegexps:
            - ".*outlier_detection.*"
            - ".*circuit_breakers.*"
            - ".*upstream_rq_retry.*"
            - ".*_cx_.*"
        defaultProviders:
          metrics:
          - prometheus
        extensionProviders:
        - name: prometheus
          prometheus: {}
      
  components:
    pilot:
      k8s:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
          # Enable automatic sidecar injection
          PILOT_ENABLE_WORKLOAD_ENTRY_AUTOREGISTRATION: true
          # Enhanced security for multi-tenancy
          PILOT_ENABLE_CROSS_CLUSTER_WORKLOAD_ENTRY: false
    
    ingressGateways:
    - name: istio-ingressgateway
      enabled: true
      k8s:
        service:
          type: NodePort
          ports:
          - port: 80
            targetPort: 8080
            nodePort: 30080
            name: http2
          - port: 443
            targetPort: 8443
            nodePort: 30443
            name: https
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 1Gi
