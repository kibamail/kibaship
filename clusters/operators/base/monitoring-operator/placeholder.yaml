# =============================================================================
# Monitoring Operator Placeholder
# =============================================================================
# This is a placeholder configuration for the monitoring operator that will
# provide comprehensive observability for the kibaship PaaS platform

apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-operator-placeholder
  namespace: monitoring
data:
  status: "placeholder"
  description: "Monitoring and observability operator - to be implemented"
  components: |
    - Prometheus for metrics collection
    - Grafana for visualization
    - AlertManager for alerting
    - Jaeger for distributed tracing
    - Loki for log aggregation
  installation-notes: |
    # Consider using:
    # - kube-prometheus-stack Helm chart
    # - Prometheus Operator
    # - Grafana Operator
