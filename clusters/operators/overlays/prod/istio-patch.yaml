apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: kibacloud-control-plane
  namespace: istio-system
spec:
  # =============================================================================
  # Istio Production Environment Patches
  # =============================================================================
  # Production environment with full resource allocations

  values:
    global:
      meshConfig:
        defaultConfig:
          holdApplicationUntilProxyStarts: true
        defaultProviders:
          metrics:
          - prometheus

  components:
    pilot:
      k8s:
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        env:
          PILOT_ENABLE_WORKLOAD_ENTRY_AUTOREGISTRATION: false

    ingressGateways:
    - name: istio-ingressgateway
      enabled: true
      k8s:
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        replicaCount: 3
