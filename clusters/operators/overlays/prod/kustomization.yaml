apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# =============================================================================
# Platform Operators Production Environment Overlay
# =============================================================================
# This overlay customizes the platform operators for production environments
# with production-grade resource allocations and enhanced security

resources:
  - ../../base

patchesStrategicMerge:
  - istio-patch.yaml

# Production-specific labels
commonLabels:
  environment: production
  cluster: production
