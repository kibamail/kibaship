apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: kibaship-control-plane
  namespace: istio-system
spec:
  # =============================================================================
  # Istio Staging Environment Patches
  # =============================================================================
  # Staging environment with reduced resource requirements

  values:
    global:
      meshConfig:
        defaultConfig:
          holdApplicationUntilProxyStarts: true
        defaultProviders:
          metrics:
          - prometheus

  components:
    pilot:
      k8s:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        env:
          PILOT_ENABLE_WORKLOAD_ENTRY_AUTOREGISTRATION: false

    ingressGateways:
    - name: istio-ingressgateway
      enabled: true
      k8s:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 512Mi
        replicaCount: 1
