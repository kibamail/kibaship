apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# =============================================================================
# Platform Operators Staging Environment Overlay
# =============================================================================
# This overlay customizes the platform operators for the staging environment
# with reduced resource requirements and relaxed security for development

resources:
  - ../../base

patchesStrategicMerge:
  - istio-patch.yaml

# Staging-specific labels
commonLabels:
  environment: staging
  cluster: staging
